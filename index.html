            const [crewBuffs, setCrewBuffs] = useState([]);
            
            const [activeEnemies, setActiveEnemies] = useState([]);
            const [enemySpawnSelect, setEnemySpawnSelect] = useState('Void Rats');

            const [activeHazards, setActiveHazards] = useState([]);
            const [hazardSelect, setHazardSelect] = useState('Pitch Black');

            // Save and Load Handlers
            const exportData = () => {
                const dataToSave = {
                    shipClass, salvage, acrDebt, aircharge, crewName, crew, legacyLocker,
                    jobCount, campaignLog, traces, shipUpgrades, activeContract, cleanExitGoal,
                    turn, phase, playLog, missionLevel, activeObjectives, activeQuietPull,
                    pressureBuilding, hitchSkips, nextMhuHazardClear, nextMhuHitchMinus1, nextMhuHitchHullShift, nextMhuHitchPrime, crewBuffs,
                    activeEnemies, activeHazards, charRollInputs, manualRolls, pendingChoices
                };
                const jsonString = JSON.stringify(dataToSave, null, 2);
                const blob = new Blob([jsonString], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `scrapjacks_save_${crewName.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        
                        if(data.shipClass) setShipClass(data.shipClass);
                        if(data.salvage !== undefined) setSalvage(data.salvage);
                        if(data.acrDebt !== undefined) setAcrDebt(data.acrDebt);
                        if(data.aircharge !== undefined) setAircharge(data.aircharge);
                        if(data.crewName) setCrewName(data.crewName);
                        
                        if(data.crew) {
                            setCrew(data.crew.map(c => ({
                                ...c,
                                redlineSurvivals: c.redlineSurvivals || 0,
                                status: c.status || 'Active'
                            })));
                        }
                        
                        if(data.legacyLocker) setLegacyLocker(data.legacyLocker);
                        if(data.jobCount !== undefined) setJobCount(data.jobCount);
                        if(data.campaignLog) setCampaignLog(data.campaignLog);
                        if(data.traces !== undefined) setTraces(data.traces);
                        if(data.shipUpgrades) setShipUpgrades(data.shipUpgrades);
                        if(data.activeContract !== undefined) setActiveContract(data.activeContract);
                        if(data.cleanExitGoal !== undefined) setCleanExitGoal(data.cleanExitGoal);
                        if(data.turn !== undefined) setTurn(data.turn);
                        if(data.phase) setPhase(data.phase);
                        if(data.playLog) setPlayLog(data.playLog);
                        if(data.missionLevel !== undefined) setMissionLevel(data.missionLevel);
                        if(data.activeObjectives) setActiveObjectives(data.activeObjectives);
                        if(data.activeQuietPull !== undefined) setActiveQuietPull(data.activeQuietPull);
                        if(data.pressureBuilding !== undefined) setPressureBuilding(data.pressureBuilding);
                        if(data.hitchSkips !== undefined) setHitchSkips(data.hitchSkips);
                        if(data.nextMhuHazardClear !== undefined) setNextMhuHazardClear(data.nextMhuHazardClear);
                        if(data.nextMhuHitchMinus1 !== undefined) setNextMhuHitchMinus1(data.nextMhuHitchMinus1);
                        if(data.nextMhuHitchHullShift !== undefined) setNextMhuHitchHullShift(data.nextMhuHitchHullShift);
                        if(data.nextMhuHitchPrime !== undefined) setNextMhuHitchPrime(data.nextMhuHitchPrime);
                        if(data.crewBuffs) setCrewBuffs(data.crewBuffs);
                        if(data.activeEnemies) setActiveEnemies(data.activeEnemies);
                        if(data.activeHazards) setActiveHazards(data.activeHazards);
                        if(data.charRollInputs) setCharRollInputs(data.charRollInputs);
                        if(data.manualRolls) setManualRolls(data.manualRolls);
                        if(data.pendingChoices) setPendingChoices(data.pendingChoices);

                        setTurnHistory(null);
                        setModalConfig({ 
                            title: "Load Successful", 
                            message: "Campaign data loaded successfully.", 
                            confirmText: "OK", 
                            onConfirm: () => setModalConfig(null), 
                            onCancel: () => setModalConfig(null) 
                        });
                    } catch (err) {
                        console.error(err);
                        setModalConfig({ 
                            title: "Load Failed", 
                            message: "Could not parse save file. It may be corrupted or of an invalid format.", 
                            confirmText: "OK", 
                            onConfirm: () => setModalConfig(null), 
                            onCancel: () => setModalConfig(null) 
                        });
                    }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            const addLog = (message) => {
                setPlayLog(prev => [`[Turn ${turn} - ${phase}] ${message}`, ...prev].slice(0, 100));
            };

            const addCampaignLog = (message) => {
                setCampaignLog(prev => [`[Op ${jobCount}] ${message}`, ...prev]);
            };

            const randomizeAllNames = () => {
                setCrew(prev => prev.map(c => ({ ...c, name: getRandomName() })));
            };
            
            const handlePrint = (layoutType) => {
                setPrintLayout(layoutType);
                setTimeout(() => window.print(), 100);
            };

            const handleShipChangeRequest = (e) => {
                setShipChangePrompt({ newShip: e.target.value });
            };

            const applyShipChange = (newShip, rollLegacy, manualRollStr) => {
                const newConfig = SHIPS[newShip];
                
                let items = rollLegacy ? [] : [...legacyLocker];
                let buff = null;
                
                if (rollLegacy) {
                    const roll = getRoll(manualRollStr, 1, 6);
                    let logMsg = `Legacy Locker Roll [${roll}]: `;

                    switch(roll) {
                        case 1:
                            items.push({ name: 'Patch-Kit', type: 'uItem', id: generateId() });
                            items.push({ name: 'Med-Kit', type: 'uItem', id: generateId() });
                            logMsg += "Emergency Kit (1 Patch-Kit, 1 Med-Kit).";
                            break;
                        case 2:
                            items.push({ name: 'Power Cell', type: 'uItem', id: generateId() });
                            logMsg += "Spare Power Cell (1 Power Cell).";
                            break;
                        case 3:
                            items.push({ name: 'Utility Choice', type: 'special', id: generateId() });
                            logMsg += "Maintained Tool (Choose 1 Utility Item).";
                            break;
                        case 4:
                            items.push({ name: 'EVA Mod Choice', type: 'special', id: generateId() });
                            logMsg += "Field Mod (Choose 1 basic EVA Mod).";
                            break;
                        case 5:
                            items.push({ name: 'Common Weapon Choice', type: 'special', id: generateId() });
                            logMsg += "Stowed Weapon (Choose 1 Common-tier weapon).";
                            break;
                        case 6:
                        default:
                            buff = { id: generateId(), text: 'Spare Seals: Ignore first AC loss on this Level (any source).' };
                            logMsg += "Spare Seals (Ignore first AC loss).";
                            break;
                    }
                    addCampaignLog(`Acquired ${newShip}. ${logMsg}`);
                    setLegacyLocker(items);
                    if (buff) setCrewBuffs(prev => [...prev, buff]);
                } else {
                    addCampaignLog(`Acquired ${newShip}. Ship upgrades reset.`);
                }

                setShipClass(newShip);
                setAircharge(newConfig.aircharge);
                setAcrDebt(newConfig.acr);
                setTurn(1);
                setPhase('Breach');
                setPlayLog([]);
                setTurnHistory(null);
                setActiveObjectives([]);
                setActiveQuietPull(null);
                setPressureBuilding(false);
                setHitchSkips(0);
                setNextMhuHazardClear(false);
                setNextMhuHitchMinus1(false);
                setNextMhuHitchHullShift(false);
                setNextMhuHitchPrime(false);
                setShipUpgrades([]); 
                setManualRolls(p => ({...p, legacy: ''}));
                setPendingChoices([]);
                
                setCrew(prev => {
                    let updatedCrew = [...prev];
                    
                    if (updatedCrew.length > newConfig.crewCount) {
                        updatedCrew = updatedCrew.slice(0, newConfig.crewCount);
                    }
                    
                    while (updatedCrew.length < newConfig.crewCount) {
                        const i = updatedCrew.length;
                        updatedCrew.push({
                            id: generateId(),
                            name: getRandomName(),
                            role: 'Torch',
                            vitals: { load: 'D10', focus: 'D8', grit: 'D6' },
                            knack: Object.keys(KNACKS)[0],
                            rattle: Object.keys(RATTLES)[1],
                            trainingModule: 'None',
                            veteranKnack: 'None',
                            suit: newConfig.suits[i] || 'Workskin',
                            melee: 'Wrecking Bar',
                            ranged: 'Coil Pistol',
                            meleeMod: 'None',
                            rangedMod: 'None',
                            evaMods: [],
                            uItems: Array(6).fill('Empty'),
                            wounds: 0,
                            stress: 0,
                            suitBreaches: 0,
                            scars: [],
                            status: 'Active',
                            redlineSurvivals: 0,
                            live: { usedLoad: false, usedFocus: false, usedGrit: false, uItemUsed: Array(6).fill(false), pushed: false, stunned: false }
                        });
                    }
                    return updatedCrew;
                });
            };

            const isOverLockerCapacity = () => {
                const shipSuits = SHIPS[shipClass].suits;
                const lockerCounts = {};
                shipSuits.forEach(s => lockerCounts[s] = (lockerCounts[s] || 0) + 1);

                const equippedCounts = {};
                crew.forEach(c => equippedCounts[c.suit] = (equippedCounts[c.suit] || 0) + 1);

                for (const suit in equippedCounts) {
                    if (equippedCounts[suit] > (lockerCounts[suit] || 0)) return true;
                }
                return false;
            };

            const overCapacity = isOverLockerCapacity();

            useEffect(() => {
                if (!overCapacity) {
                    setClearedSuitWarning(false);
                }
            }, [overCapacity]);

            const getSuitOptionLabel = (suit, charId) => {
                const shipSuits = SHIPS[shipClass].suits;
                const lockerCount = shipSuits.filter(s => s === suit).length;
                const currentlyEquippedByOthers = crew.filter(c => c.id !== charId && c.suit === suit).length;
                const available = lockerCount - currentlyEquippedByOthers;
                
                if (available > 0) return `${suit} (Available: ${available})`;
                return `${suit} (0 Available)`;
            };

            const calculateUSlots = (char) => {
                let slots = SUITS[char.suit]?.uSlots || 3;
                
                // Add weapon encumbrance (negative values subtract slots)
                if (char.melee && WEAPONS_MELEE[char.melee]) slots += WEAPONS_MELEE[char.melee].uSlots;
                if (char.ranged && WEAPONS_RANGED[char.ranged]) slots += WEAPONS_RANGED[char.ranged].uSlots;
                
                // Add mod bonuses
                if (char.meleeMod === 'Mag-Sheath') slots += 1;
                if (char.rangedMod === 'Bayonet Lug') slots += 1;
                if (char.evaMods.includes('Tool Harness')) slots += 3;

                // Knack Bonus
                if (char.knack === 'Deep Pocket') slots += 1;
                
                // Scars
                if (char.scars.includes('Permanent Accommodation')) slots -= 1;
                
                return Math.max(0, slots);
            };

            const updateCharacter = (id, field, value) => {
                setCrew(prev => prev.map(c => {
                    if (c.id !== id) return c;
                    
                    const newChar = { ...c };
                    
                    // Specific Logic Intercepts
                    if (field === 'role' && !value.startsWith('Yarddog')) {
                        if (WEAPONS_RANGED[newChar.ranged]?.ydOnly) newChar.ranged = 'Coil Pistol';
                        if (newChar.trainingModule === 'Range Time (Training)') newChar.trainingModule = 'None'; 
                    }
                    if (field === 'knack') {
                        if ((value === 'Wire Head' || value === 'Quick Stitch') && newChar.rattle === "Spacer's Shake") {
                            newChar.rattle = 'Frangible Flinch'; // Fallback
                        }
                    }
                    if (field === 'rattle') {
                        if (value === "Spacer's Shake" && (newChar.knack === 'Wire Head' || newChar.knack === 'Quick Stitch')) {
                            return c; // Invalid selection
                        }
                    }
                    if (field === 'trainingModule') {
                        if (value === 'Range Time (Training)' && !newChar.role.startsWith('Yarddog')) {
                            setModalConfig({ title: "Training Invalid", message: `Only Yarddogs can benefit from Range Time training.`, onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                            return c;
                        }
                    }

                    if (field.startsWith('vitals.')) {
                        const vType = field.split('.')[1];
                        // Swap logic to prevent duplicate dice
                        const oldVital = Object.keys(newChar.vitals).find(k => newChar.vitals[k] === value);
                        if (oldVital && oldVital !== vType) {
                            newChar.vitals[oldVital] = newChar.vitals[vType];
                        }
                        newChar.vitals[vType] = value;
                    } else if (field === 'evaMods') {
                        const maxMods = SUITS[newChar.suit]?.mods || 1;
                        if (value.length <= maxMods) newChar.evaMods = value;
                    } else if (field === 'uItems') {
                        newChar.uItems = value;
                    } else if (field === 'addScar') {
                        if (!newChar.scars.includes(value) && value !== '') {
                            newChar.scars.push(value);
                        }
                    } else if (field === 'removeScar') {
                        newChar.scars = newChar.scars.filter(s => s !== value);
                    } else {
                        newChar[field] = value;
                    }

                    return newChar;
                }));
            };

            const updateLiveState = (id, field, value) => {
                setCrew(prev => prev.map(c => c.id === id ? { ...c, live: { ...c.live, [field]: value } } : c));
            };

            const handleLiveUItemToggle = (charId, index) => {
                setCrew(prev => prev.map(c => {
                    if (c.id !== charId) return c;
                    const newUsed = [...(c.live.uItemUsed || [])];
                    newUsed[index] = !newUsed[index];
                    return { ...c, live: { ...c.live, uItemUsed: newUsed } };
                }));
            };

            const handleWoundChange = (char, w) => {
                if (char.status === 'Dead' || char.status === 'Retired') return;

                if (w === 4 && char.wounds < 4) {
                    if (char.redlineSurvivals >= 1) {
                        updateCharacter(char.id, 'wounds', 4);
                        updateCharacter(char.id, 'status', 'Retired');
                        addLog(`[CRITICAL] ${char.name} has been Redlined a second time. They are forcibly RETIRED from deep space salvage.`);
                    } else {
                        updateCharacter(char.id, 'wounds', 4);
                        setRedlinePrompt({ charId: char.id, step: 'roll', manualRoll: '' });
                        addLog(`[CRITICAL] ${char.name} has been REDLINED! Pending Grit check for survival...`);
                    }
                } else {
                    updateCharacter(char.id, 'wounds', w);
                    if (w > char.wounds) addLog(`${char.name} took a wound. Wounds: ${w}`);
                    if (w < char.wounds) addLog(`${char.name} healed a wound. Wounds: ${w}`);
                }
            };

            const applyPenaltyToChar = (char, promptData, isRandom = false) => {
                const prefix = isRandom ? '[RANDOM]: ' : '';
                if (promptData.type === 'wound') {
                    handleWoundChange(char, Math.min(4, char.wounds + promptData.amount));
                    addLog(`${prefix}${char.name} took ${promptData.amount} wound(s) from ${promptData.reason}.`);
                } else if (promptData.type === 'heal') {
                    handleWoundChange(char, Math.max(0, char.wounds - promptData.amount));
                    addLog(`${prefix}${char.name} healed ${promptData.amount} wound(s) from ${promptData.reason}.`);
                } else if (promptData.type === 'suitBreach') {
                    updateCharacter(char.id, 'suitBreaches', char.suitBreaches + promptData.amount);
                    addLog(`${prefix}${char.name} suffered a Suit Breach from ${promptData.reason}.`);
                } else if (promptData.type === 'loseGrit') {
                    updateLiveState(char.id, 'usedGrit', true);
                    addLog(`${prefix}${char.name} lost their Grit die for this activation from ${promptData.reason}.`);
                } else if (promptData.type === 'loseFocus') {
                    updateLiveState(char.id, 'usedFocus', true);
                    addLog(`${prefix}${char.name} lost their Focus die for this activation from ${promptData.reason}.`);
                } else if (promptData.type === 'stun') {
                    updateLiveState(char.id, 'stunned', true);
                    addLog(`${prefix}${char.name} is STUNNED from ${promptData.reason}.`);
                }
                setPendingPenaltyPrompt(null);
            };

            const applyRandomWound = (amount, reason) => {
                if (crew.length === 0) return;
                const aliveCrew = crew.filter(c => c.status === 'Active' && c.wounds < 4);
                const targetPool = aliveCrew.length > 0 ? aliveCrew : crew;
                const randomChar = targetPool[Math.floor(Math.random() * targetPool.length)];
                
                handleWoundChange(randomChar, Math.min(4, randomChar.wounds + amount));
                addLog(`[RANDOM WOUND]: ${randomChar.name} suffered ${amount} Wound(s) from ${reason}.`);
            };

            const handleStandardRoll = (charId, vital) => {
                saveHistory();
                const char = crew.find(c => c.id === charId);
                const sides = parseInt(char.vitals[vital].substring(1));
                const manualVal = charRollInputs[charId];
                
                const roll = manualVal ? parseInt(manualVal) : rollDice(1, sides);
                const success = roll >= 4;
                
                updateLiveState(charId, `used${vital.charAt(0).toUpperCase() + vital.slice(1)}`, true);
                updateCharRollInput(charId, ''); 
                
                addLog(`[ACTION] ${char.name} rolled ${vital.toUpperCase()} (${char.vitals[vital]}): ${manualVal ? `[Manual: ${roll}]` : `Rolled ${roll}`} -> ${success ? 'SUCCESS' : 'FAILED'}.`);
            };
            
            const resolveStun = (charId) => {
                saveHistory();
                const char = crew.find(c => c.id === charId);
                if (!char) return;
                
                let logMsg = `[STUN RECOVERY] ${char.name} attempts to recover from Stun. `;
                const updates = { stunned: false };
                
                ['load', 'focus', 'grit'].forEach(vital => {
                    if (getDieState(char, vital) === 'ready') {
                        const sides = parseInt(char.vitals[vital].substring(1));
                        const roll = rollDice(1, sides);
                        if (roll < 4) {
                            updates[`used${vital.charAt(0).toUpperCase() + vital.slice(1)}`] = true;
                            logMsg += `[${vital.toUpperCase()} (${char.vitals[vital]}): Rolled ${roll} -> EXHAUSTED] `;
                        } else {
                            logMsg += `[${vital.toUpperCase()} (${char.vitals[vital]}): Rolled ${roll} -> KEPT] `;
                        }
                    }
                });
                
                setCrew(prev => prev.map(c => c.id === charId ? { ...c, live: { ...c.live, ...updates } } : c));
                addLog(logMsg);
            };

            const rollGrenadeDeviation = () => {
                saveHistory();
                const direction = rollDice(1, 10);
                const distance = Math.ceil(direction / 2);
                addLog(`[GRENADE SCATTER] Attack failed. Grenade deviates Direction [Arrow ${direction}], Distance [${distance}"]. Center template on new location and resolve any damage.`);
            };

            const resolveGrenadeDamage = (item, target) => {
                const tData = HOSTILES_DATA[target.type];
                const isRoboticTarget = ['Droid', 'Turret', 'C-FRAME', 'Nanite', 'AI'].some(k => target.type.includes(k));
                const isEMP = item.includes('EMP');
                const isDazzler = item.includes('Dazzler');

                if (isEMP && !isRoboticTarget) {
                    addLog(`[GRENADE EFFECT] ${target.type} is unaffected by EMP (Organic).`);
                    return;
                }
                if (isDazzler && isRoboticTarget) {
                    addLog(`[GRENADE EFFECT] ${target.type} is unaffected by Dazzler (Robotic).`);
                    return;
                }

                let ddSides = parseInt(tData.dur.substring(1));
                let ddMod = -4; // Base grenade penalty
                if (tData.traits.includes('Plated') || tData.traits.includes('Armored')) ddMod += 1;
                
                const dd1 = rollDice(1, ddSides);
                const finalDD = Math.max(1, dd1 + ddMod);
                
                let logMsg = `[GRENADE EFFECT] ${target.type} DD Roll: [${dd1}] (Mod: ${ddMod}) -> Total: ${finalDD}. `;
                
                if (finalDD < 4) {
                    if (isDazzler) {
                        logMsg += "Target STUNNED.";
                    } else {
                        logMsg += "Target takes 1 Damage (-1 Quantity).";
                        updateEnemyCount(target.id, -1);
                    }
                } else {
                    logMsg += "Enemy defended the blast.";
                }
                addLog(logMsg);
            };

            const executeGrenade = () => {
                saveHistory();
                const { charId, item, itemIndex } = grenadePrompt;
                const char = crew.find(c => c.id === charId);
                const { vital, targetId, isVisible, manualRoll } = grenadeForm;

                // Consume die
                updateLiveState(char.id, `used${vital.charAt(0).toUpperCase() + vital.slice(1)}`, true);
                // Consume item
                handleLiveUItemToggle(char.id, itemIndex);

                const isYarddogRanged = char.role === 'Yarddog (Ranged)';
                const sides = parseInt(char.vitals[vital].substring(1));
                
                const manualAtk = manualRoll ? parseInt(manualRoll) : null;
                const roll1 = rollDice(1, sides);
                const roll2 = isYarddogRanged ? rollDice(1, sides) : 0;
                
                let baseAtk = manualAtk !== null ? manualAtk : (isYarddogRanged ? Math.max(roll1, roll2) : roll1);
                
                let atkMod = 0;
                if (!isVisible) atkMod -= 1; // Indirect fire penalty
                if (isYarddogRanged && manualAtk === null) atkMod += 2; // Ranged Yarddogs get +2 TDB equivalent to grenades implicitly if we count it as Ranged. We will apply +2 explicitly for TDB synergy here.
                
                let finalAtk = baseAtk + atkMod;

                let logMsg = `[GRENADE THROW] ${char.name} threw ${item}. Atk Roll: ${manualAtk !== null ? `[Manual: ${manualAtk}]` : (isYarddogRanged ? `[${roll1}, ${roll2}]` : `[${roll1}]`)}`;
                if (atkMod !== 0) logMsg += ` (Mod: ${atkMod>0?'+':''}${atkMod})`;
                logMsg += ` -> Total: ${finalAtk}. `;

                if (finalAtk >= 4) {
                    logMsg += `ON TARGET! Center LBT. (${U_ITEMS[item].effect})`;
                    addLog(logMsg);
                    
                    if (targetId !== 'ground') {
                        const target = activeEnemies.find(e => e.id === targetId);
                        if (target) resolveGrenadeDamage(item, target);
                    } else {
                        addLog(`Apply grenade effects manually to any models under the LBT.`);
                    }
                } else {
                    const scatter = rollDice(1, 10);
                    const distance = Math.ceil(scatter / 2);
                    logMsg += `MISSED! Deviates Direction [Arrow ${scatter}], Distance [${distance}"]. Center LBT on new location. (${U_ITEMS[item].effect})`;
                    addLog(logMsg);
                    addLog(`Apply grenade effects manually to any models under the drifted LBT.`);
                }

                setGrenadePrompt(null);
            };

            const openCombatModal = (char) => {
                if (activeEnemies.length === 0) {
                    setModalConfig({ title: "No Targets", message: "There are no active hostiles on the board to attack.", onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                    return;
                }
                
                const availableDice = ['load', 'focus', 'grit'].filter(v => getDieState(char, v) === 'ready');
                if (availableDice.length === 0) {
                    setModalConfig({ title: "No Action Dice", message: `${char.name} has no available action dice to perform a combat action.`, onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                    return;
                }

                setCombatForm({
                    vital: availableDice[0],
                    weaponType: 'ranged',
                    targetId: activeEnemies[0].id,
                    manualAtk: '',
                    manualDef: '',
                    isAiming: false,
                    isAssisted: false
                });
                setCombatPrompt({ charId: char.id });
            };

            const executeCombat = () => {
                saveHistory();
                const char = crew.find(c => c.id === combatPrompt.charId);
                const target = activeEnemies.find(e => e.id === combatForm.targetId);
                
                if (!char || !target) return;
                
                const vital = combatForm.vital;
                const weaponType = combatForm.weaponType;
                const weaponName = weaponType === 'melee' ? char.melee : char.ranged;
                const weaponModName = weaponType === 'melee' ? char.meleeMod : char.rangedMod;
                
                const wData = weaponType === 'melee' ? WEAPONS_MELEE[weaponName] : WEAPONS_RANGED[weaponName];
                const wModData = WEAPON_MODS[weaponModName] || { effect: '' };
                const tData = HOSTILES_DATA[target.type];
                
                // Mark die used
                updateLiveState(char.id, `used${vital.charAt(0).toUpperCase() + vital.slice(1)}`, true);
                
                // Attack Roll Logic
                const manualAtk = combatForm.manualAtk ? parseInt(combatForm.manualAtk) : null;
                const manualDef = combatForm.manualDef ? parseInt(combatForm.manualDef) : null;

                let isYarddog = char.role.startsWith('Yarddog');
                let assistedNonYarddog = false;
                
                if (combatForm.isAssisted && !isYarddog) {
                    isYarddog = true; 
                    assistedNonYarddog = true;
                }
                
                const sides = parseInt(char.vitals[vital].substring(1));
                const roll1 = rollDice(1, sides);
                const roll2 = isYarddog ? rollDice(1, sides) : 0;
                
                let baseAtk = manualAtk !== null ? manualAtk : (isYarddog ? Math.max(roll1, roll2) : roll1);
                
                // Attack Mods
                let atkMod = 0;
                if (wModData.effect.includes('+1 to Melee or Ranged')) atkMod += 1;
                if (wModData.effect.includes('+1 to Ranged') && weaponType === 'ranged') atkMod += 1;
                if (tData.traits.includes('Low-Profile') && weaponType === 'ranged') atkMod -= 1;
                
                if (combatForm.isAiming) atkMod += 2;
                if (combatForm.isAssisted && char.role.startsWith('Yarddog')) atkMod += 2; // Yarddogs get flat +2 if assisted since they already have TDB
                
                let finalAtk = baseAtk + atkMod;
                let isNat1 = manualAtk !== null ? (manualAtk === 1) : (isYarddog ? (roll1 === 1 && roll2 === 1) : (roll1 === 1));
                
                if (wModData.effect.includes('Reroll 1s') && baseAtk === 1 && manualAtk === null) {
                    baseAtk = rollDice(1, sides);
                    finalAtk = baseAtk + atkMod;
                    isNat1 = baseAtk === 1;
                }

                let logMsg = `[COMBAT] ${char.name} attacked ${target.type} with ${weaponName}. Atk Roll: ${manualAtk !== null ? `[Manual: ${manualAtk}]` : (isYarddog ? `[${roll1}, ${roll2}]` : `[${roll1}]`)}`;
                if (atkMod !== 0) logMsg += ` (Mod: ${atkMod>0?'+':''}${atkMod})`;
                logMsg += ` -> Total: ${finalAtk}. `;

                if (finalAtk < 4) {
                    addLog(logMsg + "MISSED.");
                } else {
                    // Hit! Resolve Defense
                    const defSides = parseInt(tData.dur.substring(1));
                    
                    // DD Mods
                    let ddMod = 0;
                    let rollTwice = false;
                    let damage = 1;
                    
                    const wEffects = wData?.effects || '';
                    if (wEffects.includes('-1 target DD')) ddMod -= 1;
                    if (wEffects.includes('-2 target DD')) ddMod -= 2;
                    if (wEffects.includes('-4 target DD')) ddMod -= 4;
                    if (wEffects.includes('rolls DD twice')) rollTwice = true;
                    if (wEffects.includes('Fail=Stun')) damage = 0; 
                    
                    if (combatForm.isAiming) ddMod -= 2;
                    
                    if (tData.traits.includes('Plated') || tData.traits.includes('Armored')) ddMod += 1;
                    if (wModData.effect.includes('+1 Damage')) damage += 1;
                    
                    const dd1 = rollDice(1, defSides);
                    const dd2 = rollTwice ? rollDice(1, defSides) : 99;
                    const baseDD = manualDef !== null ? manualDef : (rollTwice ? Math.min(dd1, dd2) : dd1);
                    const finalDD = Math.max(1, baseDD + ddMod);
                    
                    logMsg += `HIT! Enemy Def Roll: ${manualDef !== null ? `[Manual: ${manualDef}]` : (rollTwice ? `[${dd1}, ${dd2} -> ${baseDD}]` : `[${dd1}]`)}`;
                    if (ddMod !== 0) logMsg += ` (Mod: ${ddMod>0?'+':''}${ddMod})`;
                    logMsg += ` -> Total: ${finalDD}. `;
                    
                    if (finalAtk > finalDD) {
                        if (wEffects.includes('Fail=Stun')) {
                            logMsg += " Target STUNNED.";
                            addLog(logMsg);
                        } else {
                            logMsg += ` Target takes ${damage} Damage (-${damage} Quantity).`;
                            addLog(logMsg);
                            updateEnemyCount(target.id, -damage);
                        }
                    } else if (finalAtk === finalDD) {
                        logMsg += " Target STUNNED.";
                        addLog(logMsg);
                    } else {
                        logMsg += " Enemy defended the attack.";
                        addLog(logMsg);
                    }
                }
                
                if (wModData.effect.includes('Natural 1 on attack damages user') && isNat1) {
                    handleWoundChange(char, Math.min(4, char.wounds + 1));
                    addLog(`[CRITICAL FAILURE] ${char.name} took 1 Wound from weapon malfunction!`);
                }
                
                setCombatPrompt(null);
            };

            const openHostileAttackModal = (enemy) => {
                const aliveCrew = crew.filter(c => c.status === 'Active' && c.wounds < 4);
                if (aliveCrew.length === 0) {
                    setModalConfig({ title: "No Targets", message: "All Scrapjacks are Redlined, Dead, or Retired.", onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                    return;
                }
                
                const eData = HOSTILES_DATA[enemy.type];
                const availableWeapons = [];
                if (eData.weapons?.ranged) availableWeapons.push({ type: 'ranged', name: eData.weapons.ranged });
                if (eData.weapons?.melee) availableWeapons.push({ type: 'melee', name: eData.weapons.melee });
                
                setHostileAttackPrompt({
                    enemyId: enemy.id,
                    targetId: aliveCrew[0].id,
                    weaponType: availableWeapons.length > 0 ? availableWeapons[0].type : 'melee',
                    cover: 'None',
                    isProne: false,
                    isIsolated: false,
                    manualAtk: '',
                    manualDef: ''
                });
            };

            const executeHostileAttack = () => {
                saveHistory();
                const enemy = activeEnemies.find(e => e.id === hostileAttackPrompt.enemyId);
                const target = crew.find(c => c.id === hostileAttackPrompt.targetId);

                if (!enemy || !target) return;

                const manualAtk = hostileAttackPrompt.manualAtk ? parseInt(hostileAttackPrompt.manualAtk) : null;
                const manualDef = hostileAttackPrompt.manualDef ? parseInt(hostileAttackPrompt.manualDef) : null;

                const eData = HOSTILES_DATA[enemy.type];
                const tSuit = SUITS[target.suit];
                
                const weaponType = hostileAttackPrompt.weaponType;
                const weaponName = eData.weapons?.[weaponType];
                const wData = weaponType === 'melee' ? WEAPONS_MELEE[weaponName] : WEAPONS_RANGED[weaponName];
                const wEffects = wData?.effects || '';
                
                const hostileDamage = eData.traits.includes('Heavy Hit') ? 2 : 1;

                // Attacker Roll
                const atkSides = parseInt(eData.atk.substring(1));
                const atkRoll = manualAtk !== null ? manualAtk : rollDice(1, atkSides);

                let atkMod = 0;
                if (hostileAttackPrompt.cover === 'Obstruction') atkMod -= 1;
                if (hostileAttackPrompt.cover === 'Light') atkMod -= 2;
                if (hostileAttackPrompt.cover === 'Hard') atkMod -= 2;

                if (eData.traits.includes('Cull Protocol') && (target.live.stunned || hostileAttackPrompt.isProne || hostileAttackPrompt.isIsolated)) {
                    atkMod += 1;
                }

                const finalAtk = atkRoll + atkMod;

                let logMsg = `[HOSTILE ATTACK] ${enemy.type} attacked ${target.name}${weaponName ? ` with ${weaponName}` : ''}. Atk Roll: ${manualAtk !== null ? `[Manual: ${atkRoll}]` : `[${atkRoll}]`}`;
                if (atkMod !== 0) logMsg += ` (Mod: ${atkMod>0?'+':''}${atkMod})`;
                logMsg += ` -> Total: ${finalAtk}. `;

                if (finalAtk < 4) {
                    addLog(logMsg + "MISSED.");
                } else {
                    // Hit! Resolve DD
                    let ddSides = 4; // default
                    let ddBaseMod = 0;
                    if (tSuit.dur.includes('+')) {
                        const parts = tSuit.dur.split('+');
                        ddSides = parseInt(parts[0].substring(1));
                        ddBaseMod = parseInt(parts[1]);
                    } else {
                        ddSides = parseInt(tSuit.dur.substring(1));
                    }

                    let ddMod = ddBaseMod;
                    let rollTwice = false;

                    if (hostileAttackPrompt.cover === 'Light') ddMod += 1;
                    if (hostileAttackPrompt.cover === 'Hard') ddMod += 2;
                    if (eData.traits.includes('Heavy Hit')) ddMod -= 1;
                    if (target.live.stunned) ddMod -= 2;
                    if (hostileAttackPrompt.isProne) ddMod -= 2;

                    if (wEffects.includes('-1 target DD')) ddMod -= 1;
                    if (wEffects.includes('-2 target DD')) ddMod -= 2;
                    if (wEffects.includes('-4 target DD')) ddMod -= 4;
                    if (wEffects.includes('rolls DD twice')) rollTwice = true;

                    // Last Lung check
                    const isHalfAir = aircharge <= (SHIPS[shipClass].aircharge / 2);
                    if (target.veteranKnack === 'Last Lung' && isHalfAir) {
                        ddMod += 1;
                    }

                    // Armor mods
                    if (target.evaMods.includes('Carbon Fiber Plates')) ddMod += 1;

                    const dd1 = rollDice(1, ddSides);
                    const dd2 = rollTwice ? rollDice(1, ddSides) : 99;
                    const baseDD = manualDef !== null ? manualDef : (rollTwice ? Math.min(dd1, dd2) : dd1);
                    
                    const finalDD = Math.max(1, baseDD + ddMod);

                    logMsg += `HIT! ${target.name} DD Roll: ${manualDef !== null ? `[Manual: ${manualDef}]` : (rollTwice ? `[${dd1}, ${dd2} -> ${baseDD}]` : `[${dd1}]`)}`;
                    if (ddMod !== 0) logMsg += ` (Mod: ${ddMod>0?'+':''}${ddMod})`;
                    logMsg += ` -> Total: ${finalDD}. `;

                    if (finalDD < 4) {
                        // Injury
                        if (eData.traits.includes('System Shock')) {
                            logMsg += ` SYSTEM SHOCK: ${target.name} takes ${hostileDamage} Wound(s) (Infestation)!`;
                            handleWoundChange(target, Math.min(4, target.wounds + hostileDamage));
                        } else if (wEffects.includes('Fail=Stun')) {
                            logMsg += ` STUNNED: ${target.name} takes a severe shock!`;
                            updateLiveState(target.id, 'stunned', true);
                        } else {
                            logMsg += ` INJURY: ${target.name} takes ${hostileDamage} Wound(s)!`;
                            handleWoundChange(target, Math.min(4, target.wounds + hostileDamage));
                        }
                        
                        if (wEffects.includes('Breach')) {
                            logMsg += ` SUIT BREACH: ${target.name}'s suit integrity compromised!`;
                            updateCharacter(target.id, 'suitBreaches', target.suitBreaches + 1);
                        }
                        
                        if (eData.traits.includes('Pinning Fire')) {
                            logMsg += ` PINNED: Forced Prone.`;
                        }
                    } else {
                        logMsg += " DEFENDED.";
                    }
                    
                    addLog(logMsg);
                }
                setHostileAttackPrompt(null);
            };

            const openDisableHostileModal = (enemy) => {
                const aliveCrew = crew.filter(c => c.status === 'Active' && c.wounds < 4);
                if (aliveCrew.length === 0) {
                    setModalConfig({ title: "No Action Possible", message: "No active crew available.", onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                    return;
                }
                setDisableHostilePrompt({ enemyId: enemy.id, actorId: aliveCrew[0].id, manualRoll: '' });
            };

            const executeDisableHostile = () => {
                saveHistory();
                const char = crew.find(c => c.id === disableHostilePrompt.actorId);
                const enemy = activeEnemies.find(e => e.id === disableHostilePrompt.enemyId);
                
                if (!char || !enemy) return;
                
                if (getDieState(char, 'focus') !== 'ready') {
                    setModalConfig({ title: "No Action Die", message: `${char.name} has already spent or lost their Focus die.`, onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                    return;
                }

                updateLiveState(char.id, 'usedFocus', true);
                
                const manualRoll = disableHostilePrompt.manualRoll ? parseInt(disableHostilePrompt.manualRoll) : null;
                const isRigger = char.role.startsWith('Rigger');
                const sides = parseInt(char.vitals.focus.substring(1));
                const roll1 = manualRoll !== null ? manualRoll : rollDice(1, sides);
                
                let finalRoll = roll1;
                let logText = manualRoll !== null ? `[Manual Focus: ${roll1}]` : `[Focus: ${roll1}]`;

                if (isRigger && manualRoll === null) {
                    const roll2 = rollDice(1, sides);
                    finalRoll = Math.max(roll1, roll2);
                    logText = `[Focus (TDB): ${roll1}, ${roll2} -> ${finalRoll}]`;
                }

                if (finalRoll >= 4) {
                    addLog(`Scan/Hack SUCCESS by ${char.name} ${logText}. ${enemy.type} has been disabled and removed.`);
                    removeEnemy(enemy.id, enemy.type);
                } else {
                    addLog(`Scan/Hack FAILED by ${char.name} ${logText}. ${enemy.type} remains active.`);
                }
                
                setDisableHostilePrompt(null);
            };

            const handlePush = (char) => {
                if (aircharge <= 0 || char.live.pushed) return;
                
                saveHistory(); 
                setAircharge(prev => Math.max(0, prev - 1));
                
                const sides = parseInt(char.vitals.grit.substring(1));
                const isYarddog = char.role.startsWith('Yarddog');
                const manualVal = charRollInputs[char.id];
                const parsedVal = manualVal ? parseInt(manualVal) : null;
                
                let roll1 = parsedVal !== null ? parsedVal : rollDice(1, sides);
                let finalRoll = roll1;
                let logText = parsedVal !== null ? `[Manual Grit: ${roll1}]` : `[Grit: ${roll1}]`;

                if (isYarddog && parsedVal === null) {
                    let roll2 = rollDice(1, sides);
                    finalRoll = Math.max(roll1, roll2);
                    logText = `[Grit (TDB): ${roll1}, ${roll2} -> ${finalRoll}]`;
                }

                updateCharRollInput(char.id, '');

                if (finalRoll >= 4) {
                    setCrew(prev => prev.map(c => {
                        if (c.id === char.id) {
                            return { ...c, live: { ...c.live, pushed: true, usedLoad: false, usedFocus: false, usedGrit: false } };
                        }
                        return c;
                    }));
                    addLog(`Push Action: ${char.name} SUCCESS (-1 AC) ${logText}. Regained Free Move and Full Action Dice Pool.`);
                } else {
                    setCrew(prev => prev.map(c => {
                        if (c.id === char.id) {
                            return { ...c, live: { ...c.live, pushed: true } };
                        }
                        return c;
                    }));
                    addLog(`Push Action: ${char.name} FAILED (-1 AC) ${logText}. Action lost.`);
                }
            };

            const assignGear = (gear, charId) => {
                const charIndex = crew.findIndex(c => c.id === charId);
                if (charIndex === -1) return;
                const char = crew[charIndex];
                
                let assigned = false;
                let newChar = { ...char };

                // Handle U-Item assignment
                if (U_ITEMS[gear.name]) {
                    const emptyIndex = newChar.uItems.findIndex(i => i === 'Empty');
                    if (emptyIndex !== -1) {
                        newChar.uItems = [...newChar.uItems];
                        newChar.uItems[emptyIndex] = gear.name;
                        assigned = true;
                    } else {
                        setModalConfig({ title: "Assignment Failed", message: `${char.name} has no empty utility slots for ${gear.name}.`, onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                        return;
                    }
                } 
                // Handle EVA Mod assignment
                else if (EVA_MODS[gear.name]) {
                    const maxMods = SUITS[newChar.suit]?.mods || 1;
                    if (newChar.evaMods.length < maxMods && !newChar.evaMods.includes(gear.name)) {
                        newChar.evaMods = [...newChar.evaMods, gear.name];
                        assigned = true;
                    } else {
                        setModalConfig({ title: "Assignment Failed", message: `${char.name} cannot equip ${gear.name} (suit limits reached or already equipped).`, onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                        return;
                    }
                } 
                // Handle Weapon Mod assignment
                else if (WEAPON_MODS[gear.name]) {
                    if (newChar.meleeMod === 'None') {
                        newChar.meleeMod = gear.name;
                        assigned = true;
                    } else if (newChar.rangedMod === 'None') {
                        newChar.rangedMod = gear.name;
                        assigned = true;
                    } else {
                        setModalConfig({ title: "Assignment Failed", message: `${char.name} has no empty weapon mod slots for ${gear.name}.`, onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                        return;
                    }
                }
                // Handle Ranged Weapon assignment
                else if (WEAPONS_RANGED[gear.name]) {
                    const isYarddog = newChar.role.startsWith('Yarddog');
                    const hasRangeTraining = newChar.trainingModule === 'Range Time';
                    
                    if (WEAPONS_RANGED[gear.name].ydOnly && !isYarddog && (!hasRangeTraining || gear.name !== 'Riot Gun')) {
                        setModalConfig({ title: "Assignment Failed", message: `${char.name} is not a Yarddog and cannot equip heavy/restricted weapons like ${gear.name}.`, onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                        return;
                    }
                    newChar.ranged = gear.name;
                    assigned = true;
                }
                // Handle Special rewards that need manual adjustment (Suits, Choices)
                else {
                    setModalConfig({ 
                        title: "Manual Assignment Required", 
                        message: `${gear.name} is a special reward or suit upgrade. Please assign it manually on the character card and then clear this token from the locker.`, 
                        onConfirm: () => setModalConfig(null), 
                        onCancel: () => setModalConfig(null),
                        confirmText: "Understood"
                    });
                    return;
                }

                if (assigned) {
                    setLegacyLocker(prev => prev.filter(g => g.id !== gear.id));
                    setCrew(prev => prev.map(c => c.id === charId ? newChar : c));
                    addLog(`Assigned ${gear.name} from Legacy Locker to ${char.name}.`);
                }
            };

            const saveHistory = () => {
                setTurnHistory({
                    turn,
                    phase,
                    aircharge,
                    playLog: [...playLog],
                    pressureBuilding,
                    hitchSkips,
                    nextMhuHazardClear,
                    nextMhuHitchMinus1,
                    nextMhuHitchHullShift,
                    nextMhuHitchPrime,
                    crewBuffs: [...crewBuffs],
                    activeEnemies: [...activeEnemies],
                    activeHazards: [...activeHazards],
                    activeObjectives: [...activeObjectives],
                    activeQuietPull,
                    pendingChoices: [...pendingChoices],
                    crew: crew.map(c => ({
                        ...c, 
                        live: { 
                            ...c.live, 
                            uItemUsed: [...(c.live.uItemUsed || [])] 
                        }
                    }))
                });
            };

            // Rolling Mechanisms
            const rollSiteCondition = (manualRollStr) => {
                const roll = getRoll(manualRollStr, 1, 10);
                const total = Math.min(13, roll + missionLevel); // Cap at 13 since table goes to 13
                const condition = SITE_CONDITION_TABLE[total] || SITE_CONDITION_TABLE[13];
                addLog(`Site Condition (Level ${missionLevel}) [${manualRollStr ? 'Manual Roll' : 'Roll'}: ${roll} + ${missionLevel} = ${total}]: ${condition}`);
                
                if (total === 9 || total === 10) {
                    addLog(`[ACTION REQUIRED]: Site Condition indicates active hazard. Be sure to roll on the Hazard Table immediately upon entry.`);
                }
            };

            const rollBreach = (manualRollStr) => {
                if (nextMhuHazardClear) {
                    addLog(`Breach Entry Hazard (Level ${missionLevel}): All Clear (Objective Reward applied)`);
                    setNextMhuHazardClear(false);
                    return;
                }
                
                const sides = missionLevel === 1 ? 6 : (missionLevel === 2 ? 8 : 10);
                const roll = getRoll(manualRollStr, 1, sides);
                const result = MHU_ENTRY_HAZARD_TABLE[roll];
                addLog(`Breach Entry Hazard (Level ${missionLevel}) [${manualRollStr ? 'Manual Roll' : 'Roll'}: ${roll}]: ${result}`);
                
                if (roll === 1) addHazard('Power Loss');
                if (roll === 2) addHazard('Ghosts in the Alloy');
                if (roll === 3) addHazard('Arcs and Sparks');
                if (roll === 4) addHazard('Zero-G Conditions');
                if (roll === 5) addHazard('Toxic Fumes');
                if (roll === 6) addHazard('Flooded Compartment');
                if (roll === 7) addHazard('Hull Shift');
                if (roll === 8) addHazard('Radiation Spike');
                if (roll === 9) addHazard('Void Mold');
                if (roll === 10) addHazard('Hull Breach');
            };

            const rollObjective = (manualRollStr) => {
                const levelObjectives = OBJECTIVES[missionLevel];
                let randomKey;
                
                if (manualRollStr && levelObjectives[parseInt(manualRollStr)]) {
                    randomKey = parseInt(manualRollStr);
                } else {
                    const currentLevelObjectives = activeObjectives.filter(o => o.level === missionLevel).map(o => o.text);
                    const availableKeys = Object.keys(levelObjectives).filter(k => !currentLevelObjectives.includes(levelObjectives[k]));
                    
                    if (availableKeys.length === 0) {
                        addLog(`All unique objectives for Level ${missionLevel} have already been identified.`);
                        return;
                    }
                    randomKey = availableKeys[Math.floor(Math.random() * availableKeys.length)];
                }

                const newObjText = levelObjectives[randomKey];
                
                setActiveObjectives(prev => [...prev, { id: generateId(), text: newObjText, level: missionLevel, type: 'objective' }]);
                addLog(`Objective (Level ${missionLevel}) [${manualRollStr ? 'Manual Roll' : 'Roll'}: ${randomKey}]: ${newObjText}`);
            };

            const openResolveTaskPrompt = (obj) => {
                const aliveCrew = crew.filter(c => c.status === 'Active' && c.wounds < 4);
                if (aliveCrew.length === 0) {
                    setModalConfig({ title: "Cannot Interact", message: "No active crew available to perform this action.", onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                    return;
                }
                setObjectivePrompt({ obj, actorId: aliveCrew[0].id, die: 'load' });
            };

            const resolveObjectiveOrPOI = (success) => {
                if (!objectivePrompt) return;
                saveHistory(); 
                
                const { obj, actorId, die } = objectivePrompt;
                const actor = crew.find(c => c.id === actorId);
                const actorStr = actor ? `${actor.name} using ${die.toUpperCase()}` : 'Crew';
                const isObj = obj.type === 'objective';
                
                if (actor && die !== 'none') {
                    updateLiveState(actor.id, `used${die.charAt(0).toUpperCase() + die.slice(1)}`, true);
                }
                
                if (success) {
                    setActiveObjectives(prev => prev.filter(o => o.id !== obj.id));
                    let sAdd = 0;
                    let aAdd = 0;
                    let gear = [];
                    let special = "";
                    
                    const lowerText = obj.text.toLowerCase();
                    
                    // Specific Objective Payouts
                    if (obj.type === 'objective') {
                        if (lowerText.includes('power bypass')) {
                            gear.push('Power Cell', 'Override Chip', 'Override Chip');
                        } else if (lowerText.includes('tag and mark')) {
                            gear.push('Power Cell', getRandomItem('uItem'), getRandomItem('uItem'));
                            aAdd += 1;
                        } else if (lowerText.includes('identify crew member')) {
                            aAdd += 1;
                            gear.push(getRandomItem('evaMod'));
                        } else if (lowerText.includes('system scrape')) {
                            gear.push(getRandomItem('evaMod'));
                            setNextMhuHazardClear(true);
                            special = "Next MHU Entry Hazard will be All Clear.";
                        } else if (lowerText.includes('drone bay recovery')) {
                            setHitchSkips(prev => prev + 1);
                            sAdd = rollDice(2, 4);
                            special = "Gained 1 Hitch Skip.";
                        } else if (lowerText.includes('recover data pad')) {
                            aAdd += 1;
                            gear.push(getRandomItem('uItem'));
                            sAdd = rollDice(1, 6);
                        }
                        else if (lowerText.includes('auxiliary power restoration')) {
                            gear.push('Power Cell', 'Power Cell', 'Det-Cord', 'Override Chip');
                        } else if (lowerText.includes('secure recovery tag')) {
                            aAdd += 1;
                            gear.push('Override Chip', getRandomItem('uItem'), getRandomItem('uItem'));
                        } else if (lowerText.includes('personnel confirmation')) {
                            aAdd += 1;
                            gear.push('Rig Suit (Large)');
                        } else if (lowerText.includes('network quarantine')) {
                            gear.push(getRandomItem('evaMod'));
                            setNextMhuHitchMinus1(true);
                            special = "Next MHU first Hitch receives -1 penalty to roll.";
                        } else if (lowerText.includes('drone control salvage')) {
                            sAdd = rollDice(1, 6);
                            gear.push('Hardshell Suit (Large)');
                        } else if (lowerText.includes('black box retrieval')) {
                            sAdd = rollDice(2, 4);
                            setPendingChoices(p => [...p, { id: generateId(), type: 'obj_l2_6', source: 'Black Box Retrieval' }]);
                        }
                        else if (lowerText.includes('primary power reboot')) {
                            gear.push('Power Cell', 'Power Cell', 'Power Cell');
                            setHitchSkips(prev => prev + 1);
                            special = "Gained 1 Hitch Skip.";
                        } else if (lowerText.includes('deep recovery tag')) {
                            aAdd += 2;
                            gear.push('Override Chip', getRandomItem('evaMod'));
                        } else if (lowerText.includes('vip bio sample')) {
                            gear.push('Void Suit (Large)');
                            setCrewBuffs(prev => [...prev, { id: generateId(), text: 'Free Grit Reroll for each crew member (Next MHU)' }]);
                            special = "Crew gains Free Grit Rerolls for next MHU.";
                        } else if (lowerText.includes('system override')) {
                            gear.push(getRandomItem('evaMod'), getRandomItem('evaMod'));
                            setNextMhuHazardClear(true);
                            special = "Next MHU Entry Hazard will be All Clear.";
                        } else if (lowerText.includes('fabricator salvage')) {
                            sAdd = rollDice(2, 6);
                            gear.push(getRandomItem('wepMod'));
                            aAdd += 1;
                        } else if (lowerText.includes('black box data recovery')) {
                            gear.push(getRandomItem('uItem'), getRandomItem('uItem'));
                            setHitchSkips(prev => prev + 2);
                            special = "Gained 2 Hitch Skips.";
                        }
                    }

                    // Interactive POI Payouts
                    if (obj.type === 'poi_L1_1') {
                        const r = rollDice(1,6);
                        if (r >= 6) sAdd = rollDice(2,4); else if (r >= 4) sAdd = rollDice(1,4);
                        special = sAdd > 0 ? "Salvage Found in Lockers." : "Lockers Empty.";
                    } else if (obj.type === 'poi_L1_2') {
                        gear.push('Utility Choice', 'Utility Choice'); aAdd += 1; sAdd = rollDice(1,4);
                    } else if (obj.type === 'poi_L1_3') {
                        gear.push('Power Cell'); sAdd = rollDice(1,4);
                    } else if (obj.type === 'poi_L1_4') {
                        gear.push('Med-Kit', 'Patch-Kit'); aAdd += 1;
                    } else if (obj.type === 'poi_L1_5') {
                        gear.push('PitBull', getRandomItem('wepMod'));
                    } else if (obj.type === 'poi_L1_6') {
                        gear.push('Power Cell', 'Utility Choice', 'Utility Choice'); sAdd = rollDice(1,4);
                    } else if (obj.type === 'poi_L1_7') {
                        gear.push(getRandomItem('uItem'), getRandomItem('uItem'), getRandomItem('evaMod'));
                    } else if (obj.type === 'poi_L1_8') {
                        aAdd += 1; sAdd = rollDice(2,4); gear.push('Override Chip');
                    }
                    
                    else if (obj.type === 'poi_L2_1') {
                        const r = rollDice(1,6);
                        if (r >= 5) sAdd = rollDice(2,4); else if (r >= 3) sAdd = rollDice(1,4);
                        special = sAdd > 0 ? "Salvage Found in Lockers." : "Lockers Empty.";
                    } else if (obj.type === 'poi_L2_2') {
                        gear.push('Utility Choice', 'Utility Choice'); aAdd += 1; sAdd = rollDice(1,4);
                    } else if (obj.type === 'poi_L2_3') {
                        gear.push('Power Cell'); sAdd = rollDice(1,6);
                    } else if (obj.type === 'poi_L2_4') {
                        gear.push('Med-Kit', 'Med-Kit', 'Patch-Kit'); aAdd += 1;
                    } else if (obj.type === 'poi_L2_5') {
                        gear.push('Large Weapon Choice', getRandomItem('wepMod'));
                    } else if (obj.type === 'poi_L2_6') {
                        gear.push('Power Cell', 'Utility Choice', 'Utility Choice'); sAdd = rollDice(1,4);
                    } else if (obj.type === 'poi_L2_7') {
                        gear.push(getRandomItem('uItem'), getRandomItem('uItem'), getRandomItem('uItem'), getRandomItem('evaMod'));
                    } else if (obj.type === 'poi_L2_8') {
                        aAdd += 1; sAdd = rollDice(2,4); gear.push('Override Chip');
                    }

                    else if (obj.type === 'poi_L3_1') {
                        const r = rollDice(1,6);
                        if (r >= 5) sAdd = rollDice(3,4); else if (r >= 3) sAdd = rollDice(2,4);
                        special = sAdd > 0 ? "Salvage Found in Lockers." : "Lockers Empty.";
                    } else if (obj.type === 'poi_L3_2') {
                        gear.push(getRandomItem('uItem'), getRandomItem('uItem'), getRandomItem('uItem')); aAdd += 1; sAdd = rollDice(2,4);
                    } else if (obj.type === 'poi_L3_3') {
                        gear.push('Power Cell', 'Power Cell'); sAdd = rollDice(1,6);
                    } else if (obj.type === 'poi_L3_4') {
                        gear.push('Patch-Kit', 'Patch-Kit', 'Med-Kit', 'Med-Kit'); aAdd += 1;
                    } else if (obj.type === 'poi_L3_5') {
                        gear.push('Large Yarddog Weapon Choice', getRandomItem('wepMod'));
                    } else if (obj.type === 'poi_L3_6') {
                        gear.push('Power Cell', 'Utility Choice', 'Utility Choice'); sAdd = rollDice(2,4);
                        if (die === 'focus') { sAdd += rollDice(1,4); special = "Extra salvage from successful Scan/Hack."; }
                    } else if (obj.type === 'poi_L3_7') {
                        gear.push(getRandomItem('uItem'), getRandomItem('uItem'), getRandomItem('uItem'), getRandomItem('uItem'), getRandomItem('evaMod'));
                    } else if (obj.type === 'poi_L3_8') {
                        aAdd += 2; sAdd = rollDice(3,4); gear.push('Override Chip');
                    }

                    if (sAdd > 0) setSalvage(prev => prev + sAdd);
                    if (aAdd > 0) setAircharge(prev => prev + aAdd);
                    if (gear.length > 0) {
                        setLegacyLocker(prev => [...prev, ...gear.map(g => ({ name: g, type: (g.includes('Suit') || g.includes('Choice') || g.includes('OR')) ? 'special' : 'uItem', id: generateId() }))]);
                    }

                    let logMsg = `${isObj ? 'Objective Completed' : 'POI Resolved'} by ${actorStr}: ${obj.text.split('(')[0].trim()}. `;
                    let rewards = [];
                    if (sAdd > 0) rewards.push(`+${sAdd} Salvage`);
                    if (aAdd > 0) rewards.push(`+${aAdd} Aircharge`);
                    if (gear.length > 0) rewards.push(`Recovered: ${gear.join(', ')}`);
                    if (special) rewards.push(special);
                    
                    addLog(logMsg + (rewards.length > 0 ? rewards.join(' | ') : "Rewards applied."));
                    
                } else {
                    // Fail Logic
                    let consequence = "Action failed. Die spent.";
                    const lowerText = obj.text.toLowerCase();

                    // Obj Failures
                    if (isObj) {
                        if (lowerText.includes('secure recovery tag') && missionLevel === 2) {
                            setNextMhuHitchMinus1(true); consequence = "+1 to next Hitch roll.";
                        } else if (lowerText.includes('network quarantine')) {
                            setPendingPenaltyPrompt({ type: 'stun', amount: 1, reason: 'Failed Network Quarantine (Shock Risk)' }); consequence = "Pending Stun selection.";
                        } else if (lowerText.includes('primary power reboot')) {
                            rollHitch(manualRolls.hitch); consequence = "Immediate Hitch rolled.";
                        } else if (lowerText.includes('deep recovery tag') && missionLevel === 3) {
                            setAircharge(a => Math.max(0, a-1)); consequence = "-1 Aircharge.";
                        } else if (lowerText.includes('system override')) {
                            setPendingPenaltyPrompt({ type: 'stun', amount: 1, reason: 'Failed System Override (Shock Risk)' }); consequence = "Pending Stun selection.";
                        } else if (lowerText.includes('fabricator salvage') || lowerText.includes('black box data recovery')) {
                            rollHitch(manualRolls.hitch); consequence = "Immediate Hitch rolled.";
                        }
                    }

                    // POI Failures
                    if (obj.type === 'poi_L1_3' || obj.type === 'poi_L2_3') {
                        setPendingPenaltyPrompt({ type: 'stun', amount: 1, reason: 'Failed Power Terminal (Shock Risk)' }); consequence = "Pending Stun selection.";
                    } else if (obj.type === 'poi_L2_4' || obj.type === 'poi_L3_2') {
                        setAircharge(a => Math.max(0, a-1)); consequence = "-1 Aircharge.";
                    } else if (obj.type === 'poi_L2_5') {
                        setNextMhuHitchMinus1(true); consequence = "Alarm Triggered (+1 to next Hitch roll).";
                    } else if (obj.type === 'poi_L2_7') {
                        consequence = "Actor loses 1 carried Utility Item (Manually remove from roster).";
                    } else if (obj.type === 'poi_L2_8') {
                        consequence = "Crew must resist. Make Grit rolls manually.";
                    } else if (obj.type === 'poi_L3_3') {
                        setPendingPenaltyPrompt({ type: 'wound', amount: 1, reason: 'Failed Primary Power Core (Shock Risk)' }); consequence = "Pending Wound selection.";
                    } else if (obj.type === 'poi_L3_4') {
                        setNextMhuHitchHullShift(true); consequence = "Next Hitch will automatically result in Hull Shift.";
                    } else if (obj.type === 'poi_L3_5') {
                        setNextMhuHitchPrime(true); consequence = "Next Hitch rerolled to Hostile w/ Prime.";
                    } else if (obj.type === 'poi_L3_7') {
                        updateLiveState(actor.id, 'usedGrit', true); consequence = `${actor.name} loses their Grit die for their next activation.`;
                    } else if (obj.type === 'poi_L3_8') {
                        rollHitch(manualRolls.hitch); consequence = "Immediate Hitch rolled.";
                    }

                    addLog(`${isObj ? 'Objective' : 'POI'} FAILED by ${actorStr}: ${obj.text.split('(')[0].trim()}. ${consequence}`);
                }
                
                setObjectivePrompt(null);
            };

            const rollSalvage = (silent = false, actorId = null, manualRollStr = '') => {
                saveHistory();
                const roll = getRoll(manualRollStr, 1, 10);
                const actor = crew.find(c => c.id === actorId);
                const actorPrefix = actor && !silent ? `${actor.name} accessed ` : '';
                
                let resultText = `Salvage [${manualRollStr ? 'Manual Roll' : 'Roll'}: ${roll}]: `;
                let gainedSalvage = 0;
                let gainedGear = null;

                if (roll <= 2) { gainedSalvage = rollDice(1, 6); resultText += `Scrap Metal (1d6: +${gainedSalvage} Salvage)`; }
                else if (roll <= 4) { gainedSalvage = rollDice(2, 6); resultText += `Spare Parts (2d6: +${gainedSalvage} Salvage)`; }
                else if (roll <= 6) { gainedSalvage = rollDice(3, 6); resultText += `Industrial Materials (3d6: +${gainedSalvage} Salvage)`; }
                else if (roll <= 8) { gainedSalvage = rollDice(4, 6); resultText += `High-Tech Components (4d6: +${gainedSalvage} Salvage)`; }
                else if (roll === 9) { gainedSalvage = rollDice(5, 6); resultText += `Intact Machinery (5d6: +${gainedSalvage} Salvage)`; }
                else if (roll === 10) { 
                    gainedSalvage = rollDice(6, 6); 
                    const mod = getRandomItem('mod');
                    resultText += `Pristine Artifact (6d6: +${gainedSalvage} Salvage & recovered ${mod})`; 
                    gainedGear = { name: mod, type: 'mod' };
                }

                setSalvage(prev => prev + gainedSalvage);
                if (gainedGear) {
                    setLegacyLocker(prev => [...prev, { ...gainedGear, id: generateId() }]);
                }
                
                if (!silent) addLog(`${actorPrefix}${resultText}`);
                return resultText;
            };

            const rollPOI = (actorId, manualRollStr = '') => {
                saveHistory();
                const actor = crew.find(c => c.id === actorId);
                const actorPrefix = actor ? `${actor.name} accessed ` : '';
                const roll = getRoll(manualRollStr, 1, 8);
                
                let poiObj = null;
                let logMsg = `${actorPrefix}Identified POI (Level ${missionLevel}) [${manualRollStr ? 'Manual Roll' : 'Roll'}: ${roll}]: `;
                
                if (missionLevel === 1) {
                    if (roll === 1) poiObj = { text: 'Sealed Locker Bank (Access: Break/Brace)', type: 'poi_L1_1' };
                    if (roll === 2) poiObj = { text: 'Supply Crate (Access: Break/Brace)', type: 'poi_L1_2' };
                    if (roll === 3) poiObj = { text: 'Power Relay Cabinet (Access: Scan/Hack)', type: 'poi_L1_3' };
                    if (roll === 4) poiObj = { text: 'Emergency Aid Cabinet (Access: Break/Brace)', type: 'poi_L1_4' };
                    if (roll === 5) poiObj = { text: 'Security Locker (Access: Scan/Hack)', type: 'poi_L1_5' };
                    if (roll === 6) poiObj = { text: 'Maintenance Supply Cabinet (Access: Break/Brace)', type: 'poi_L1_6' };
                    if (roll === 7) poiObj = { text: 'Data Node (Access: Scan/Hack)', type: 'poi_L1_7' };
                    if (roll === 8) poiObj = { text: 'Support System Terminal (Access: Break/Brace)', type: 'poi_L1_8' };
                } else if (missionLevel === 2) {
                    if (roll === 1) poiObj = { text: 'Collapsed Locker Run (Access: Break/Brace)', type: 'poi_L2_1' };
                    if (roll === 2) poiObj = { text: 'Reinforced Supply Crate (Access: Break/Brace)', type: 'poi_L2_2' };
                    if (roll === 3) poiObj = { text: 'Auxiliary Power Junction (Access: Scan/Hack)', type: 'poi_L2_3' };
                    if (roll === 4) poiObj = { text: 'Emergency Medical Cache (Access: Break/Brace)', type: 'poi_L2_4' };
                    if (roll === 5) poiObj = { text: 'Security Equipment Locker (Access: Scan/Hack)', type: 'poi_L2_5' };
                    if (roll === 6) poiObj = { text: 'Maintenance Spares Cabinet (Access: Break/Brace OR Scan/Hack)', type: 'poi_L2_6' };
                    if (roll === 7) poiObj = { text: 'Encrypted Data Node (Access: Scan/Hack)', type: 'poi_L2_7' };
                    if (roll === 8) poiObj = { text: 'Life Support Control Console (Access: Break/Brace)', type: 'poi_L2_8' };
                } else if (missionLevel === 3) {
                    if (roll === 1) poiObj = { text: 'Fused Locker Vault (Access: Scan/Hack AND Break/Brace)', type: 'poi_L3_1' };
                    if (roll === 2) poiObj = { text: 'Hazard-Sealed Supply Pod (Access: Scan/Hack THEN Break/Brace)', type: 'poi_L3_2' };
                    if (roll === 3) poiObj = { text: 'Primary Power Core Access (Access: Scan/Hack)', type: 'poi_L3_3' };
                    if (roll === 4) poiObj = { text: 'Trauma Response Cache (Access: Break/Brace)', type: 'poi_L3_4' };
                    if (roll === 5) poiObj = { text: 'Armory Lockframe (Access: Scan/Hack AND Break/Brace)', type: 'poi_L3_5' };
                    if (roll === 6) poiObj = { text: 'Fabrication Materials Locker (Access: Break/Brace OR Scan/Hack)', type: 'poi_L3_6' };
                    if (roll === 7) poiObj = { text: 'Deep Memory Archive (Access: Scan/Hack)', type: 'poi_L3_7' };
                    if (roll === 8) poiObj = { text: 'Environmental Control Nexus (Access: Break/Brace)', type: 'poi_L3_8' };
                }

                if (poiObj) {
                    setActiveObjectives(prev => [...prev, { id: generateId(), text: poiObj.text, type: poiObj.type, level: missionLevel }]);
                    addLog(logMsg + poiObj.text.split('(')[0] + ". Added to Active Objectives list for interaction.");
                }
            };

            const rollQuietPull = (manualRollStr = '') => {
                const aliveCrew = crew.filter(c => c.status === 'Active' && c.wounds < 4);
                if (aliveCrew.length === 0) {
                    setModalConfig({ title: "Cannot Declare", message: "No active crew available to declare a Quiet Pull.", onConfirm: () => setModalConfig(null), onCancel: () => setModalConfig(null) });
                    return;
                }
                const roll = getRoll(manualRollStr, 1, 8);
                const qp = QUIET_PULLS[roll];
                setActiveQuietPull({ ...qp, roll });
                setQpForm({ actorId: aliveCrew[0].id, die: 'load' });
                addLog(`Declared Quiet Pull: [${manualRollStr ? 'Manual Roll' : 'Roll'}: ${roll}] ${qp.name}. Access Required: ${qp.access}`);
            };

            const resolveQuietPull = (success) => {
                saveHistory();
                if (!activeQuietPull) return;
                
                const actor = crew.find(c => c.id === qpForm.actorId);
                const actorStr = actor ? `${actor.name} using ${qpForm.die.toUpperCase()}` : 'Crew';
                
                if (actor && qpForm.die !== 'none') {
                    updateLiveState(actor.id, `used${qpForm.die.charAt(0).toUpperCase() + qpForm.die.slice(1)}`, true);
                }

                if (success) {
                    addLog(`Quiet Pull SUCCESS by ${actorStr}: ${activeQuietPull.name}. Reward: ${activeQuietPull.reward}`);
                    
                    if (activeQuietPull.roll === 1) setSalvage(s => s + rollDice(2,4));
                    if (activeQuietPull.roll === 2) setSalvage(s => s + rollDice(1,4));
                    if (activeQuietPull.roll === 3) setLegacyLocker(p=>[...p, {name: getRandomItem('uItem'), type: 'uItem', id: generateId()}]);
                    if (activeQuietPull.roll === 4) setSalvage(s => s + rollDice(1,4));
                    
                    if (activeQuietPull.roll === 7) {
                        setPendingChoices(p => [...p, { id: generateId(), type: 'qp7', source: activeQuietPull.name }]);
                    }
                    if (activeQuietPull.roll === 8) {
                        setPendingChoices(p => [...p, { id: generateId(), type: 'qp8', source: activeQuietPull.name }]);
                    }
                } else {
                    addLog(`Quiet Pull FAILED by ${actorStr}: ${activeQuietPull.name}. Consequence: ${activeQuietPull.fail}`);
                    setTraces(t => t + 1);
                    addLog(`+1 Trace added to Crew Record.`);
                    if (activeQuietPull.roll === 3) setAircharge(a => Math.max(0, a - 1));
                }
                setActiveQuietPull(null);
            };

            const getDeploymentText = () => {
                const d1 = Math.floor(Math.random() * 4) + 1;
                const d2 = Math.floor(Math.random() * 4) + 1;
                if (d1 === d2) return `Corner ${d1} (x4 models)`;
