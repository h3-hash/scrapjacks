            };

            const getDeploymentText = () => {
                const d1 = Math.floor(Math.random() * 4) + 1;
                const d2 = Math.floor(Math.random() * 4) + 1;
                if (d1 === d2) return `Corner ${d1} (x4 models)`;
                return `Corner ${d1} (x2 models), Corner ${d2} (x2 models)`;
            };

            const processHitchEvent = (lvl, rollVal, isPrimeChecked = true) => {
                let text = "";
                let spawnedEnemy = null;
                let pCheck = false;

                if (lvl === 1) {
                    if (rollVal === 1) { text = "All Clear. No Hazards or Hostiles this turn."; }
                    else if (rollVal === 2) { text = "Arcs and Sparks. Risk Stun when entering or moving."; addHazard('Arcs and Sparks'); }
                    else if (rollVal === 3) { text = "Power Loss. MHU goes dark. Darkness penalties apply."; addHazard('Power Loss'); }
                    else if (rollVal === 4) { text = "Ghosts in the Alloy. All Scrapjacks roll Grit -1."; addHazard('Ghosts in the Alloy'); }
                    else if (rollVal === 5) { text = "Toxic Fumes. One tile affected. LOS reduced."; addHazard('Toxic Fumes'); }
                    else if (rollVal === 6) { text = "Void Rats (Ghost Step). Spawn normally."; spawnedEnemy = 'Void Rats'; pCheck = true; }
                    else if (rollVal === 7) { text = "Small Maintenance Droids (Fast-Mover). Spawn normally."; spawnedEnemy = 'Small Maintenance Droids'; pCheck = true; }
                    else if (rollVal === 8) { text = "Infested Crew (Frenzied). Spawn normally."; spawnedEnemy = 'Infested Crew'; pCheck = true; }
                    else if (rollVal === 9) { text = "Hull Shift. All Scrapjacks roll DD. Fail: suffer 1 Wound."; addHazard('Hull Shift'); }
                    else if (rollVal === 10) { text = "Pressure Building. No immediate effect. Next Hitch uses Level II table."; }
                } else if (lvl === 2) {
                    if (rollVal === 1) {
                        const subRoll = Math.floor(Math.random() * 6) + 1;
                        if (subRoll <= 3) { text = "Uneasy Silence -> Raiders spawn (Cull Protocol)."; spawnedEnemy = 'Raiders'; pCheck = true; }
                        else { text = "Uneasy Silence -> All Clear."; }
                    }
                    else if (rollVal === 2) { text = "Arcs and Sparks. Risk Stun this turn."; addHazard('Arcs and Sparks'); }
                    else if (rollVal === 3) { text = "Radiation Spike. All Scrapjacks roll Focus -1."; addHazard('Radiation Spike'); }
                    else if (rollVal === 4) { text = "Hull Breach. Roll D4 for quadrant."; addHazard('Hull Breach'); }
                    else if (rollVal === 5) { text = "Pirates (Low-Profile). Spawn normally."; spawnedEnemy = 'Pirates'; pCheck = true; }
                    else if (rollVal === 6) { text = "Small Security Droids (Double-Tap). Spawn and activate immediately."; spawnedEnemy = 'Small Security Droids'; pCheck = true; }
                    else if (rollVal === 7) { text = "Nanite Swarm (System Shock). Spawn normally."; spawnedEnemy = 'Nanite Swarm'; pCheck = true; }
                    else if (rollVal === 8) { text = "Large Maintenance Droids (Heavy Hit). Spawn normally."; spawnedEnemy = 'Large Maintenance Droids'; pCheck = true; }
                    else if (rollVal === 9) { text = "Small Xeno Types (First Contact). Spawn normally."; spawnedEnemy = 'Small Xeno Types'; pCheck = true; }
                    else if (rollVal === 10) { text = "Toxic Fumes. LOS reduced to 6 inches."; addHazard('Toxic Fumes'); }
                } else if (lvl === 3) {
                    if (rollVal === 1) { text = "She's Breaking Up. Resolve Hull Shift and Arcs and Sparks."; addHazard('Hull Shift'); addHazard('Arcs and Sparks'); }
                    else if (rollVal === 2) { text = "Double Hull Breach. Two quadrants lose pressure."; addHazard('Hull Breach'); addHazard('Double Hull Breach'); }
                    else if (rollVal === 3) { text = "Total Power Loss. MHU goes dark until end of next activation."; addHazard('Total Power Loss'); }
                    else if (rollVal === 4) { text = "Large Security Droids (Plated, Double-Tap). Spawn normally."; spawnedEnemy = 'Large Security Droids'; pCheck = true; }
                    else if (rollVal === 5) { text = "VRG Compliance Team (Low-Profile, Pinning Fire). Spawn normally."; spawnedEnemy = 'VRG Compliance Team'; pCheck = true; }
                    else if (rollVal === 6) { text = "Bio-Asset (Frenzied, Cull Protocol). Spawn normally."; spawnedEnemy = 'Bio-Asset'; pCheck = true; }
                    else if (rollVal === 7) { text = "C-FRAME Combat Units (Redundant Core, Self-Sealing). Spawn and activate immediately."; spawnedEnemy = 'C-FRAME Combat Units'; pCheck = true; }
                    else if (rollVal === 8) { text = "Radiation Spike + Toxic Fumes. Both Hazards apply simultaneously."; addHazard('Radiation Spike'); addHazard('Toxic Fumes'); }
                    else if (rollVal === 9) { text = "Large Xeno Types (Reach). Spawn normally."; spawnedEnemy = 'Large Xeno Types'; pCheck = true; }
                    else if (rollVal === 10) { text = "Everything Breaks. Resolving twice..."; }
                }

                if (spawnedEnemy) {
                    const deployText = getDeploymentText();
                    if (isPrimeChecked && pCheck) {
                        const primeRoll = Math.floor(Math.random() * 6) + 1;
                        if (primeRoll <= 3 || nextMhuHitchPrime) {
                            text += ` -> [Prime Check: ${primeRoll}] [PRIME SPAWNS!] [Deploy: ${deployText}]`;
                            let primeType = `Prime (${spawnedEnemy})`;
                            if (!HOSTILES_DATA[primeType]) primeType = spawnedEnemy; 
                            spawnSpecificEnemy(primeType, 1, deployText);
                            spawnSpecificEnemy(spawnedEnemy, 3, deployText);
                            if(nextMhuHitchPrime) setNextMhuHitchPrime(false);
                        } else {
                            text += ` -> [Prime Check: ${primeRoll}] Normal. [Deploy: ${deployText}]`;
                            spawnSpecificEnemy(spawnedEnemy, 4, deployText);
                        }
                    } else {
                         text += ` [Deploy: ${deployText}]`;
                         spawnSpecificEnemy(spawnedEnemy, 4, deployText);
                    }
                }

                return text;
            };

            const rollHitch = (manualRollStr = '') => {
                let roll = getRoll(manualRollStr, 1, 10);
                let effectiveLevel = missionLevel;
                let logPrefix = '';

                if (pressureBuilding) {
                    effectiveLevel = 2;
                    logPrefix = `Hitch (Pressure Building - Forced Level 2) [${manualRollStr ? 'Manual Roll' : 'Roll'}: ${roll}]: `;
                    setPressureBuilding(false);
                } else if (nextMhuHitchMinus1) {
                    roll = Math.max(1, roll - 1);
                    logPrefix = `Hitch (Level ${missionLevel}) [${manualRollStr ? 'Manual Roll' : 'Roll'}: ${roll} (-1 Objective Buff applied)]: `;
                    setNextMhuHitchMinus1(false);
                } else if (nextMhuHitchHullShift) {
                    logPrefix = `Hitch (Level ${missionLevel}) [Forced Consequence]: `;
                    setNextMhuHitchHullShift(false);
                    addLog(logPrefix + "Hull Shift. All Scrapjacks roll DD. Fail: suffer 1 Wound.");
                    addHazard('Hull Shift');
                    return;
                } else {
                    logPrefix = `Hitch (Level ${missionLevel}) [${manualRollStr ? 'Manual Roll' : 'Roll'}: ${roll}]: `;
                }

                let text = logPrefix;
                
                if (roll === 10 && effectiveLevel === 3) {
                    const r1 = Math.floor(Math.random() * 9) + 1; 
                    const r2 = Math.floor(Math.random() * 9) + 1;
                    text += `EVERYTHING BREAKS! -> Result 1: ${processHitchEvent(effectiveLevel, r1)} AND Result 2: ${processHitchEvent(effectiveLevel, r2)}`;
                } else {
                    text += processHitchEvent(effectiveLevel, roll);
                }

                if (effectiveLevel === 1 && roll === 10) {
                    setPressureBuilding(true);
                }

                addLog(text);
            };

            // Play Mode Main Controls
            const advancePhase = () => {
                saveHistory();

                if (phase === 'Breach') {
                    if (turn === 1) rollSiteCondition(manualRolls.site);
                    rollBreach(manualRolls.hazard);
                    rollObjective(manualRolls.objective);
                    setManualRolls(p => ({...p, site: '', hazard: '', objective: ''}));
                    setPhase('Sweep');
                    setCrew(prev => prev.map(c => ({
                        ...c,
                        live: { ...c.live, usedLoad: false, usedFocus: false, usedGrit: false, pushed: false, stunned: false }
                    })));
                    addLog(`Phase advanced to: Sweep (Breach executed). Action Dice refreshed.`);
                } else {
                    const nextPhase = phase === 'Sweep' ? 'Hitch' : 'Sweep';
                    setPhase(nextPhase);
                    addLog(`Phase advanced to: ${nextPhase}`);

                    if (nextPhase === 'Hitch') {
                        rollHitch(manualRolls.hitch);
                        setManualRolls(p => ({...p, hitch: ''}));
                    } else if (nextPhase === 'Sweep') {
                        setCrew(prev => prev.map(c => ({
                            ...c,
                            live: { ...c.live, usedLoad: false, usedFocus: false, usedGrit: false, pushed: false, stunned: false }
                        })));
                        addLog(`Action Dice refreshed.`);
                    }
                }
            };

            const callExtraction = () => {
                saveHistory();
                setPhase('Call');
                const netSalvage = salvage - acrDebt;
                let traceMsg = "";
                
                if (activeContract && activeContract.type === 'Quiet Pull') {
                    traceMsg = " [Quiet Pull Complete - Apply Traces manually if aborted/failed]";
                }

                addLog(`Phase advanced to: Call. Scrapjacks are electing to extract. Mission terminates here.${traceMsg}`);
                addLog(`MISSION END. Salvage: ${salvage} | ACR: ${acrDebt} | Net Profit: ${netSalvage}`);
                
                addCampaignLog(`Op ${jobCount} Complete. Extracted from ${activeContract ? activeContract.target : 'Sector'}. Total Banked Salvage: ${salvage}. ACR Debt: ${acrDebt}.`);
                setJobCount(j => j + 1);
            };

            const prepareToBreach = () => {
                saveHistory();
                setPhase('Reset');
                addLog(`Phase advanced to: Reset. Tallying final aircharge and preparing to push to the next MHU.`);
            };

            const breachNextMHU = () => {
                saveHistory();

                const totalBreaches = crew.reduce((sum, c) => sum + c.suitBreaches, 0);
                const airDrain = 1 + totalBreaches;
                
                setAircharge(prev => Math.max(0, prev - airDrain));
                setTurn(prev => prev + 1);
                setPressureBuilding(false);
                setCrewBuffs([]); // Reset single MHU buffs
                
                // Refresh all spent Action Dice
                setCrew(prev => prev.map(c => ({
                    ...c,
                    live: { ...c.live, usedLoad: false, usedFocus: false, usedGrit: false, pushed: false }
                })));
                
                setActiveEnemies([]);
                setActiveHazards([]);
                setActiveQuietPull(null);
                setPhase('Breach');
                
                addLog(`--- END OF TURN ---`);
                addLog(`Advanced to Turn ${turn + 1}. Action Dice refreshed.`);
                addLog(`Aircharge decreased by ${airDrain} (Base 1 + ${totalBreaches} from breaches).`);
                
                addLog(`--- PREPARING TO BREACH NEXT MHU ---`);
                addLog(`Cleared all previous enemies and hazards. Standing by for Breach phase.`);
            };

            const undoAction = () => {
                if (!turnHistory) return;
                setTurn(turnHistory.turn);
                setPhase(turnHistory.phase);
                setAircharge(turnHistory.aircharge);
                setPressureBuilding(turnHistory.pressureBuilding || false);
                setHitchSkips(turnHistory.hitchSkips || 0);
                setNextMhuHazardClear(turnHistory.nextMhuHazardClear || false);
                setNextMhuHitchMinus1(turnHistory.nextMhuHitchMinus1 || false);
                setNextMhuHitchHullShift(turnHistory.nextMhuHitchHullShift || false);
                setNextMhuHitchPrime(turnHistory.nextMhuHitchPrime || false);
                setCrewBuffs(turnHistory.crewBuffs || []);
                setPlayLog([`[Turn ${turnHistory.turn} - ${turnHistory.phase}] Undo: Reverted last action.`, ...turnHistory.playLog]);
                setCrew(turnHistory.crew);
                setActiveEnemies(turnHistory.activeEnemies || []);
                setActiveHazards(turnHistory.activeHazards || []);
                setActiveObjectives(turnHistory.activeObjectives || []);
                setActiveQuietPull(turnHistory.activeQuietPull || null);
                setPendingChoices(turnHistory.pendingChoices || []);

            const applyNewMission = () => {

                setTurnHistory(null);
                setActiveEnemies([]);
                setActiveHazards([]);
                setActiveObjectives([]);
                setActiveQuietPull(null);
                setPressureBuilding(false);
                setHitchSkips(0);
                setNextMhuHazardClear(false);
                setNextMhuHitchMinus1(false);
                setNextMhuHitchHullShift(false);
                setNextMhuHitchPrime(false);
                setCrewBuffs([]);
                setPendingChoices([]);
                setManualRolls({ site: '', hazard: '', objective: '', hitch: '', qp: '', audit: '', legacy: '' });
                setCharRollInputs({});
                setCrew(prev => prev.map(c => ({
                    ...c,
                    wounds: 0,
                    stress: 0,
                    suitBreaches: 0,
                    status: 'Active',
                    live: { usedLoad: false, usedFocus: false, usedGrit: false, uItemUsed: Array(6).fill(false), pushed: false, stunned: false }

            const handleNewMissionRequest = () => {

                });

                setJobCount(1);
                setCampaignLog([]);

                setActiveContract(null);

                setTurn(1);
                setPhase('Breach');
                setPlayLog([]);
                setTurnHistory(null);
                setMissionLevel(1);
                setActiveObjectives([]);
                setActiveQuietPull(null);
                setPressureBuilding(false);
                setHitchSkips(0);

                setNextMhuHitchHullShift(false);

                setActiveEnemies([]);

            const handleNewCrewRequest = () => {

            };

            // Campaign Helpers
            const generateContract = (type) => {
                const sizeRoll = Math.floor(Math.random() * 3) + 1;
                const sizeText = sizeRoll === 1 ? 'Small (1-3 MHU)' : sizeRoll === 2 ? 'Medium (4-6 MHU)' : 'Large (7-9 MHU)';
                const comp = CONTRACT_COMPLICATIONS[Math.floor(Math.random() * CONTRACT_COMPLICATIONS.length)];
                
                let target = "";
                if (type === 'PO') {
                    target = CONTRACT_TARGETS[Math.floor(Math.random() * CONTRACT_TARGETS.length)];

                    target = OFF_CONTRACT_TARGETS[Math.floor(Math.random() * OFF_CONTRACT_TARGETS.length)];

                setActiveContract({ type, size: sizeText, target, complications: comp });
                addCampaignLog(`Generated Contract: [${type}] - Target: ${target} (${sizeText}). Complication: ${comp}`);
            };

            const resolveAudit = (manualRollStr) => {
                const roll = getRoll(manualRollStr, 1, 6);
                const extraPulls = Math.max(0, traces - 3);
                const severity = roll + extraPulls;
                
                let auditText = `VRG AUDIT TRIGGERED! Roll: [${manualRollStr ? 'Manual Roll: ' : ''}${roll}] + ${extraPulls} (extra traces) = ${severity}. `;
                
                if (severity <= 2) {
                    auditText += `[ROUTINE REVIEW]: Lose 1D4 Salvage. Next job -1 Aircharge.`;
                    setSalvage(s => Math.max(0, s - rollDice(1,4)));
                } else if (severity <= 4) {
                    auditText += `[COMPLIANCE ACTION]: Lose 1D6 Salvage. Next job: First Hitch cannot be All Clear.`;
                    setSalvage(s => Math.max(0, s - rollDice(1,6)));
                } else if (severity <= 6) {
                    const lost = rollDice(2,6);
                    setSalvage(s => Math.max(0, s - lost));
                    
                    // Assign random scar to a crew member
                    let randomName = "No active crew";
                    let scarName = "None";
                    if (crew.length > 0) {
                        const aliveCrew = crew.filter(c => c.wounds < 4 && c.status === 'Active');
                        const targetPool = aliveCrew.length > 0 ? aliveCrew : crew;
                        const randomChar = targetPool[Math.floor(Math.random() * targetPool.length)];
                        const availableScars = SCARS.filter(s => !randomChar.scars.includes(s));
                        scarName = availableScars.length > 0 ? availableScars[Math.floor(Math.random() * availableScars.length)] : SCARS[0];
                        
                        updateCharacter(randomChar.id, 'addScar', scarName);
                        randomName = randomChar.name;
                    }
                    auditText += `[ENFORCEMENT AUDIT]: Lose ${lost} Salvage. +1 ACR next job. ${randomName} suffers random Scar: ${scarName}.`;
                } else {
                    const itemsLost = Math.min(legacyLocker.length, Math.floor(Math.random() * 4) + 1);
                    let newLocker = [...legacyLocker];
                    for(let i=0; i<itemsLost; i++) {
                        const idx = Math.floor(Math.random() * newLocker.length);
                        newLocker.splice(idx, 1);
                    }
                    setLegacyLocker(newLocker);
                    auditText += `[FULL LOCKDOWN]: Lose ALL Salvage. Next job must be PO. Automatic Audit follows. ${itemsLost} items seized from Legacy Locker.`;
                    setSalvage(0);
                }

                setTraces(0);
                setManualRolls(p => ({...p, audit: ''}));
                addCampaignLog(auditText);
            };

            const adjustAircharge = (amount) => {
                setAircharge(prev => {
                    const next = Math.max(0, prev + amount);
                    if (amount > 0) addLog(`Aircharge manually increased by ${amount}.`);
                    if (amount < 0) addLog(`Aircharge manually decreased by ${Math.abs(amount)}.`);
                    return next;
                });
            };

            const spawnEnemy = () => {
                const deployText = getDeploymentText();
                const spawnQty = enemySpawnSelect.includes('Apex') || enemySpawnSelect.includes('Prime') || enemySpawnSelect === 'Automated Turret' ? 1 : 4;
                
                setActiveEnemies(prev => [...prev, {
                    id: generateId(),
                    type: enemySpawnSelect,
                    damage: 0,
                    count: spawnQty,
                    deployment: deployText
                }]);
                addLog(`Spawned Hostile manually: ${enemySpawnSelect} (Qty: ${spawnQty}) [Deploy: ${deployText}]`);
            };

            const spawnSpecificEnemy = (type, qty, deploymentLoc = '') => {
                setActiveEnemies(prev => [...prev, {
                    id: generateId(),
                    type: type,
                    damage: 0,
                    count: qty,
                    deployment: deploymentLoc
                }]);
                addLog(`Auto-Spawned Hostile: ${type} (Qty: ${qty})`);
            };

            const updateEnemyDamage = (id, amount) => {
                setActiveEnemies(prev => prev.map(e => e.id === id ? { ...e, damage: Math.max(0, e.damage + amount) } : e));
            };

            const updateEnemyCount = (id, amount) => {
                setActiveEnemies(prev => {
                    let targetType = null;
                    const nextState = prev.map(e => {
                        if (e.id === id) {
                            const newCount = e.count + amount;
                            if (newCount <= 0) targetType = e.type;
                            return { ...e, count: Math.max(0, newCount) };
                        }
                        return e;
                    });
                    
                    if (targetType) {
                        addLog(`${targetType} group eliminated from the board.`);
                        return nextState.filter(e => e.id !== id);
                    }
                    return nextState;
                });
            };

            const removeEnemy = (id, type) => {
                setActiveEnemies(prev => prev.filter(e => e.id !== id));
                addLog(`Removed Hostile: ${type}`);
            };

            const addHazard = (type) => {
                setActiveHazards(prev => {
                    if (prev.some(h => h.type === type)) return prev; // Avoid duplicate hazard entries
                    addLog(`Active Hazard Added: ${type}`);
                    return [...prev, { id: generateId(), type: type }];
                });
            };

            const removeHazard = (id, type) => {
                setActiveHazards(prev => prev.filter(h => h.id !== id));
                addLog(`Cleared Hazard: ${type}`);
            };

            const handleHazardFail = (hazardType) => {
                const hData = HAZARDS_DATA[hazardType];
                if (!hData || !hData.hasCheck) return;

                saveHistory();

                if (hData.failType === 'aircharge') {
                    setAircharge(prev => Math.max(0, prev - hData.failAmount));
                    addLog(`Hazard Check FAILED: ${hazardType}. Penalty applied: -${hData.failAmount} Aircharge.`);
                } else if (hData.failType === 'log') {
                    addLog(`Hazard Check FAILED: ${hazardType}. Consequence: ${hData.penaltyDesc}.`);
                } else {
                    setPendingPenaltyPrompt({
                        type: hData.failType,
                        amount: hData.failAmount || 1,
                        reason: `Hazard Check FAILED: ${hazardType}. Apply ${hData.penaltyDesc}.`
                    });
                }
            };

            // Compute main advance button text
            let advanceBtnText = '';
            let advanceBtnSub = '';
            if (phase === 'Breach') {
                advanceBtnText = 'Breach and advance to Sweep';
                advanceBtnSub = 'Roll Entry Hazards & Objectives';
            } else if (phase === 'Sweep') {
                advanceBtnText = 'Advance to Hitch';
                advanceBtnSub = 'Standard Action Loop';
            } else if (phase === 'Hitch') {
                advanceBtnText = 'Advance to Sweep';
                advanceBtnSub = 'Standard Action Loop';
            } else {
                advanceBtnText = 'End of Cycle';
                advanceBtnSub = 'Choose Call or Reset';
            }

            const mainObjs = activeObjectives.filter(o => o.type === 'objective');
            const poiTasks = activeObjectives.filter(o => o.type.startsWith('poi_'));
            
            const currentObjective = mainObjs.length > 0 ? mainObjs[mainObjs.length - 1] : null;
            const previousObjectives = mainObjs.length > 1 ? mainObjs.slice(0, -1) : [];

            return (
                <div className="min-h-screen bg-slate-900 pb-12">
                    {modalConfig && <Modal {...modalConfig} />}

                    {pendingChoices.length > 0 && !modalConfig && !combatPrompt && !hostileAttackPrompt && !disableHostilePrompt && !objectivePrompt && !tableRollPrompt && !redlinePrompt && !pendingPenaltyPrompt && !shipChangePrompt && !grenadePrompt && (() => {
                        const choice = pendingChoices[0];
                        const resolveChoice = (actionFn, logText) => {
                            saveHistory();
                            actionFn();
                            addLog(`Choice Resolved (${choice.source}): ${logText}`);
                            setPendingChoices(p => p.slice(1));
                        };

                        if (choice.type === 'qp7') {
                            return (
                                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 no-print">
                                    <div className="bg-slate-800 border border-slate-600 p-6 rounded-lg shadow-xl max-w-sm w-full">
                                        <h3 className="text-xl font-bold text-white mb-2">Reward Choice</h3>
                                        <p className="text-slate-300 mb-6 text-sm">{choice.source} completed. Choose your reward:</p>
                                        <div className="flex flex-col gap-3">
                                            <button onClick={() => resolveChoice(() => {
                                                const s = rollDice(2, 4);
                                                setSalvage(prev => prev + s);
                                            }, "+2D4 Salvage")} className="px-4 py-2 bg-emerald-700 hover:bg-emerald-600 rounded text-white font-bold text-sm shadow">+2D4 Salvage</button>
                                            <button onClick={() => resolveChoice(() => setNextMhuHazardClear(true), "Next MHU All Clear")} className="px-4 py-2 bg-indigo-700 hover:bg-indigo-600 rounded text-white font-bold text-sm shadow">Next MHU All Clear</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        }

                        if (choice.type === 'qp8') {
                             return (
                                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 no-print">
                                    <div className="bg-slate-800 border border-slate-600 p-6 rounded-lg shadow-xl max-w-sm w-full">
                                        <h3 className="text-xl font-bold text-white mb-2">Reward Choice</h3>
                                        <p className="text-slate-300 mb-6 text-sm">{choice.source} completed. Choose your reward:</p>
                                        <div className="flex flex-col gap-3">
                                            <button onClick={() => resolveChoice(() => {
                                                const s = rollDice(3, 4);
                                                setSalvage(prev => prev + s);
                                            }, "+3D4 Salvage")} className="px-4 py-2 bg-emerald-700 hover:bg-emerald-600 rounded text-white font-bold text-sm shadow">+3D4 Salvage</button>
                                            <button onClick={() => resolveChoice(() => setAcrDebt(0), "Waived ACR Debt")} className="px-4 py-2 bg-indigo-700 hover:bg-indigo-600 rounded text-white font-bold text-sm shadow">Waive ACR Debt</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        }

                        if (choice.type === 'obj_l2_6') {
                             return (
                                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-50 no-print">
                                    <div className="bg-slate-800 border border-slate-600 p-6 rounded-lg shadow-xl max-w-sm w-full">
                                        <h3 className="text-xl font-bold text-white mb-2">Reward Choice</h3>
                                        <p className="text-slate-300 mb-6 text-sm">{choice.source} completed. Choose your recovered gear:</p>
                                        <div className="flex flex-col gap-3">
                                            <button onClick={() => resolveChoice(() => setLegacyLocker(p => [...p, { name: 'Sunjet', type: 'special', id: generateId() }]), "Sunjet")} className="px-4 py-2 bg-emerald-700 hover:bg-emerald-600 rounded text-white font-bold text-sm shadow">Sunjet</button>
                                            <button onClick={() => resolveChoice(() => setLegacyLocker(p => [...p, { name: 'Power Shears', type: 'special', id: generateId() }]), "Power Shears")} className="px-4 py-2 bg-indigo-700 hover:bg-indigo-600 rounded text-white font-bold text-sm shadow">Power Shears (Large)</button>
                                        </div>
                                    </div>
                                </div>
                            );
                        }

                        return null;
                    })()}

                    {redlinePrompt && (() => {
                        const char = crew.find(c => c.id === redlinePrompt.charId);
                        if (!char) return null;
                        return (
                            <div className="fixed inset-0 bg-black/90 flex items-center justify-center z-50 no-print">
                                <div className="bg-red-950 border-2 border-red-600 p-6 rounded-xl shadow-2xl max-w-md w-full">
                                    <h3 className="text-2xl font-black text-red-500 mb-2 uppercase tracking-widest text-center">Redlined</h3>
                                    <p className="text-red-200 mb-6 text-center text-sm">{char.name} has suffered a fatal injury.</p>

                                    {redlinePrompt.step === 'roll' && (
                                        <div className="flex flex-col items-center">
                                            <p className="text-slate-300 mb-4 text-center text-sm">Make a free Grit roll ({char.vitals.grit}) to see if they pass into the Great Beyond.</p>
                                            
                                            <input 
                                                type="number" 
                                                value={redlinePrompt.manualRoll || ''} 
                                                onChange={e => setRedlinePrompt({...redlinePrompt, manualRoll: e.target.value})} 
                                                className="w-full bg-slate-900 text-white p-3 rounded border border-red-700 focus:outline-none focus:border-red-400 mb-4 text-center text-lg placeholder-red-900/50" 
                                                placeholder="Manual Grit Roll (Optional)" 
                                            />
                                            
                                            <button onClick={() => {
                                                const sides = parseInt(char.vitals.grit?.substring(1) || 4);
                                                const roll = getRoll(redlinePrompt.manualRoll, 1, sides);
                                                if (roll >= 4) {
                                                    addLog(`[REDLINE] ${char.name} rolled ${redlinePrompt.manualRoll ? `[Manual: ${roll}]` : roll} on Grit. They are clinging to life!`);
                                                    setRedlinePrompt({ ...redlinePrompt, step: 'revive' });
                                                } else {
                                                    addLog(`[REDLINE] ${char.name} rolled ${redlinePrompt.manualRoll ? `[Manual: ${roll}]` : roll} on Grit. They did not survive.`);
                                                    updateCharacter(char.id, 'status', 'Dead');
                                                    setRedlinePrompt(null);
                                                }
                                            }} className="w-full py-3 bg-red-700 hover:bg-red-600 text-white font-bold rounded shadow-lg transition-colors text-lg border border-red-500">
                                                Roll Grit
                                            </button>
                                        </div>
                                    )}

                                    {redlinePrompt.step === 'revive' && (
                                        <div className="flex flex-col items-center">
                                            <p className="text-emerald-300 mb-4 text-center text-sm font-bold">They survived the check and are clinging to life!</p>
                                            <p className="text-slate-300 mb-4 text-center text-xs">Another crew member must use a Med-Kit to revive them. (Deduct the Med-Kit manually from your locker/inventory).</p>
                                            <button onClick={() => {
                                                setRedlinePrompt({ ...redlinePrompt, step: 'consequence' });
                                            }} className="w-full py-3 bg-emerald-700 hover:bg-emerald-600 text-white font-bold rounded shadow-lg transition-colors text-lg border border-emerald-500">
                                                Revive with Med-Kit
                                            </button>
                                        </div>
                                    )}

                                    {redlinePrompt.step === 'consequence' && (
                                        <div className="flex flex-col gap-4">
                                            <p className="text-amber-300 mb-2 text-center text-sm font-bold">Survival instinct kept you alive—but it changed you.</p>
                                            <p className="text-slate-300 mb-2 text-center text-xs">Choose a lasting consequence:</p>

                                            <button onClick={() => {
                                                updateCharacter(char.id, 'addScar', 'Permanent Accommodation');
                                                updateCharacter(char.id, 'redlineSurvivals', char.redlineSurvivals + 1);
                                                updateCharacter(char.id, 'wounds', 3);
                                                addLog(`[REDLINE RESOLVED] ${char.name} revived. Gained Permanent Accommodation (-1 U-Slot).`);
                                                setRedlinePrompt(null);
                                            }} className="w-full py-2 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded border border-slate-600 text-sm">
                                                Permanent Accommodation (-1 U-Slot)
                                            </button>

                                            <div className="border-t border-red-900 my-2 relative">
                                                <span className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-red-950 px-2 text-xs text-red-500 font-bold">OR GAIN A SCAR</span>
                                            </div>

                                            <div className="flex gap-2">
                                                <select id="scarSelect" className="flex-1 bg-slate-900 border border-slate-700 text-white text-xs p-2 rounded focus:outline-none">
                                                    {SCARS.filter(s => !char.scars.includes(s)).map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                                <button onClick={() => {
                                                    const selectedScar = document.getElementById('scarSelect').value;
                                                    if(selectedScar) {
                                                        updateCharacter(char.id, 'addScar', selectedScar);
                                                        updateCharacter(char.id, 'redlineSurvivals', char.redlineSurvivals + 1);
                                                        updateCharacter(char.id, 'wounds', 3);
                                                        addLog(`[REDLINE RESOLVED] ${char.name} revived. Gained Scar: ${selectedScar}.`);

                                                                {char.evaMods.map(mod => (
                                                                    <div key={mod} style={{marginBottom:'4px'}}>
                                                                        <span style={{fontSize:'10px', fontWeight:'bold'}}>{mod}</span>
                                                                        <div className="rules-text">{EVA_MODS[mod].effect}</div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>

                                            <div style={{display: 'flex', gap: '8px', marginBottom: '8px'}}>
                                                <div className="print-section" style={{flex: 1}}>
                                                    <div style={{fontSize:'10px', fontWeight:'bold'}}>CREW AIRCHARGE SUPPLY</div>
                                                    <div className="print-box" style={{borderBottomWidth: '2px'}}></div>
                                                </div>
                                                <div className="print-section" style={{flex: 1}}>
                                                    <div style={{fontSize:'10px', fontWeight:'bold'}}>RECOVERED SALVAGE</div>
                                                    <div className="print-box" style={{borderBottomWidth: '2px'}}></div>
                                                </div>
                                                <div className="print-section" style={{flex: 1}}>
                                                    <div style={{fontSize:'10px', fontWeight:'bold'}}>LEGACY LOCKER</div>
                                                    <div className="print-box" style={{borderBottomWidth: '2px', padding: '2px', fontSize: '8px', whiteSpace: 'normal'}}>
                                                        {legacyLocker.map(g => g.name).join(', ')}
                                                    </div>
                                                </div>
                                            </div>

                                            <div style={{display: 'flex', gap: '8px'}}>
                                                <div className="print-section" style={{flex: 1}}>
                                                    <div className="print-section-title">UTILITY SLOTS (Capacity: {availableUSlots})</div>
                                                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px'}}>
                                                        {Array.from({length: Math.max(6, availableUSlots)}).map((_, i) => {
                                                            const itemName = char.uItems[i] || 'Empty';
                                                            const isEquipped = itemName !== 'Empty';
                                                            return (
                                                                <div key={i} className="print-uitem" style={{opacity: i >= availableUSlots ? 0.3 : 1}}>
                                                                    <div className="print-uitem-box"></div>
                                                                    <div style={{borderBottom: '1px solid #ccc', flex: 1, minHeight: '16px', paddingBottom: '2px'}}>
                                                                        {isEquipped ? (
                                                                            <>
                                                                                <strong>{itemName}</strong>
                                                                                <div className="rules-text" style={{marginTop:'1px'}}>{U_ITEMS[itemName].effect}</div>
                                                                            </>
                                                                        ) : (
                                                                            <span style={{color: '#999', fontStyle: 'italic'}}>{i >= availableUSlots ? 'Slot Unavailable' : ''}</span>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                            )
                                                        })}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="print-footer">
                                                PROPERTY OF VASTSTAR RECOVERY GROUP <br/>
                                                Unauthorized alteration voids contract.
                                            </div>
                                        </div>
                                    )
                                })}
                                
                                {/* Appended Campaign & Vessel Tracker for the Roster Printout */}
                                <div className="print-card" style={{marginTop: '24px'}}>
                                    <div className="print-header">
                                        <span>CAMPAIGN & VESSEL RECORD - {crewName.toUpperCase()}</span>
                                        <span>FORM VRG-SJ-CMP-01</span>
                                    </div>
                                    
                                    <div style={{display: 'flex', gap: '12px'}}>
                                        <div style={{flex: 1}}>
                                            <div className="print-section">
                                                <div className="print-section-title">VESSEL STATUS</div>
                                                <div className="print-row"><strong>CLASS:</strong> {shipClass}</div>
                                                <div className="print-row"><strong>ACR DEBT:</strong> {acrDebt}</div>
                                                <div className="print-row"><strong>UPGRADES:</strong> {shipUpgrades.length > 0 ? shipUpgrades.join(', ') : 'None'}</div>
                                            </div>
                                            <div className="print-section">
                                                <div className="print-section-title">VRG COMPLIANCE</div>
                                                <div className="print-row"><strong>ACTIVE TRACES:</strong> {traces} / 3</div>
                                                <div className="rules-text">Audit triggers at 3 Traces.</div>
                                            </div>
                                        </div>
                                        <div style={{flex: 1}}>
                                            <div className="print-section">
                                                <div className="print-section-title">FINANCIALS</div>
                                                <div className="print-row"><strong>BANKED SALVAGE:</strong> {salvage}</div>
                                                <div className="print-row"><strong>CLEAN EXIT TARGET:</strong> {cleanExitGoal}</div>
                                            </div>
                                            <div className="print-section">
                                                <div className="print-section-title">LEGACY LOCKER ITEMS</div>
                                                <div className="rules-text">
                                                    {legacyLocker.length > 0 ? legacyLocker.map(g => g.name).join(', ') : 'Empty'}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="print-footer">
                                        PROPERTY OF VASTSTAR RECOVERY GROUP <br/>
                                        Unauthorized alteration voids contract.
                                    </div>
                                </div>
                            </>
                        )}
                        
                        {/* AAR Print Layout */}
                        {printLayout === 'aar' && (
                            <div className="print-card">
                                <div className="print-header">
                                    <span>AFTER ACTION REPORT (AAR)</span>
                                    <span>FORM VRG-SJ-AAR-02</span>
                                </div>
                                
                                <div className="print-section">
                                    <div className="print-section-title">MISSION SUMMARY</div>
                                    <div className="print-row"><strong>CREW DESIGNATION:</strong> {crewName}</div>
                                    <div className="print-row"><strong>VESSEL DEPLOYED:</strong> {shipClass}</div>
                                    <div className="print-row"><strong>TURNS SURVIVED:</strong> {turn}</div>
                                    <div className="print-row"><strong>REMAINING AIRCHARGE:</strong> {aircharge} units</div>
                                    <div className="print-row"><strong>TOTAL SALVAGE SECURED:</strong> {salvage} units</div>
                                    <div className="print-row"><strong>OUTSTANDING ACR DEBT:</strong> {acrDebt} units</div>
                                    <div className="print-row"><strong>NET MISSION PROFIT:</strong> {salvage - acrDebt} units</div>
                                </div>

                                <div className="print-section mt-4">
                                    <div className="print-section-title">CREW DEBRIEF</div>
                                    <div style={{display: 'flex', flexDirection: 'column', gap: '8px', marginTop: '6px'}}>
                                        {crew.map(c => {
                                            const isRedlined = c.wounds >= 4;
                                            return (
                                                <div key={c.id} style={{ display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid #ccc', paddingBottom: '4px' }}>
                                                    <span style={{ fontSize: '12px' }}><strong>{c.name}</strong> ({c.role})</span>
                                                    <span style={{ fontSize: '10px', color: isRedlined ? 'red' : 'black', fontWeight: isRedlined ? 'bold' : 'normal' }}>
                                                        {isRedlined ? 'REDLINED/MIA' : 'ACTIVE'} | Wounds: {c.wounds}/4 | Stress: {c.stress}/4 | Suit Breaches: {c.suitBreaches}
                                                    </span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="print-section mt-4">
                                    <div className="print-section-title">OPERATIONAL LOG</div>
                                    <div style={{ fontSize: '10px', marginTop: '8px' }}>
                                        {playLog.length > 0 ? playLog.slice().reverse().map((log, i) => (
                                            <div key={i} className="aar-log-entry">{log}</div>
                                        )) : <div style={{fontStyle: 'italic', padding: '8px 0'}}>No events logged during mission timeframe.</div>}
                                    </div>
                                </div>

                                <div className="print-footer mt-6 border-t border-black pt-2 text-center">
                                    SUBMITTED TO VASTSTAR RECOVERY GROUP <br/>
                                    ALL SALVAGE REMAINS PROPERTY OF VRG PENDING DEBT SETTLEMENT.
                                </div>
                            </div>
                        )}

                        {/* Campaign Log Print Layout */}
                        {printLayout === 'campaign' && (
                            <div className="print-card">
                                <div className="print-header">
                                    <span>CAMPAIGN RECORD - {crewName.toUpperCase()}</span>
                                    <span>FORM VRG-SJ-CMP-03</span>
                                </div>
                                
                                <div className="print-section">
                                    <div className="print-section-title">CREW STATUS</div>
                                    <div className="print-row"><strong>CREW DESIGNATION:</strong> {crewName}</div>
                                    <div className="print-row"><strong>CURRENT VESSEL:</strong> {shipClass}</div>
                                    <div className="print-row"><strong>BANKED SALVAGE:</strong> {salvage} units</div>
                                    <div className="print-row"><strong>ACTIVE TRACES:</strong> {traces} / 3</div>
                                </div>

                                <div className="print-section mt-4">
                                    <div className="print-section-title">SUPPORT ASSETS & UPGRADES</div>
                                    <div className="rules-text" style={{marginTop: '4px', fontSize: '11px'}}>
                                        {shipUpgrades.length > 0 ? shipUpgrades.join(' | ') : 'No upgrades equipped.'}
                                    </div>
                                </div>

                                <div className="print-section mt-4">
                                    <div className="print-section-title">OPERATIONS HISTORY</div>
                                    <div style={{ fontSize: '10px', marginTop: '8px' }}>
                                        {campaignLog.length > 0 ? campaignLog.map((log, i) => (
                                            <div key={i} className="aar-log-entry" style={{padding: '4px 0'}}>{log}</div>
                                        )) : <div style={{fontStyle: 'italic', padding: '8px 0'}}>No operations logged on record.</div>}
                                    </div>
                                </div>

                                <div className="print-footer mt-6 border-t border-black pt-2 text-center">
                                    SUBMITTED TO VASTSTAR RECOVERY GROUP <br/>
                                    UNAUTHORIZED ALTERATION VOIDS CONTRACT.
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
